<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cristián heyne</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --accent: #e63946; 
      --soft: rgba(0,0,0,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.2;
    }

    main {
      padding: clamp(1.5rem, 5vw, 4rem);
      max-width: 900px; /* Reducido ligeramente para centrar más la atención */
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      margin-bottom: clamp(2rem, 8vh, 3.5rem);
    }

    .name {
      font-size: 11px; /* Un poco más pequeña */
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .name::after {
      content: "";
      width: 5px;
      height: 5px;
      background: var(--accent);
    }

    /* ── GRID SYSTEM ── */
    .table {
      display: flex;
      flex-direction: column;
    }

    .group {
      display: grid;
      grid-template-columns: 130px 1fr;
      border-top: 1px solid var(--fg);
      padding: 1.2rem 0; /* Menos padding vertical */
      opacity: 0;
      animation: reveal 0.6s ease forwards;
    }

    .group:last-child {
      border-bottom: 1px solid var(--fg);
    }

    .cat-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--soft);
      padding-top: 5px;
    }

    .items-col {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .item {
      text-decoration: none;
      color: var(--fg);
      display: inline-flex;
      width: fit-content;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .item-name {
      /* Reducción clave: el máximo ahora es 1.6rem (~25px) en lugar de 32px */
      font-size: clamp(1.2rem, 2vw, 1.6rem); 
      font-weight: 700;
      letter-spacing: -0.025em;
      position: relative;
    }

    .item:hover {
      color: var(--accent);
      transform: translateX(10px);
    }

    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding-top: 3.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .visitor-box {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }

    .visitor-num {
      display: block;
      font-size: 16px;
      font-weight: 800;
      margin-top: 2px;
    }

    .meta {
      font-size: 9px;
      text-align: right;
      font-weight: 600;
      line-height: 1.6;
      text-transform: uppercase;
      color: var(--soft);
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Ajustes para pantallas pequeñas */
    @media (max-width: 600px) {
      .group { grid-template-columns: 1fr; gap: 0.3rem; padding: 0.8rem 0; }
      .cat-label { padding-bottom: 0.2rem; border-bottom: 1px solid #f5f5f5; margin-bottom: 0.3rem; }
      .item-name { font-size: 1.3rem; }
      footer { flex-direction: column; align-items: flex-start; gap: 1.2rem; }
      .meta { text-align: left; }
    }
  </style>
</head>
<body>

<main>
  <header>
    <div class="name">cristián heyne</div>
  </header>

  <div class="table">
    <div class="group" style="animation-delay: 0.1s">
      <div class="cat-col"><span class="cat-label">música</span></div>
      <div class="items-col">
        <a class="item" href="https://www.instagram.com/shogu_n__/" target="_blank" rel="noopener"><span class="item-name">shogun</span></a>
        <a class="item" href="https://www.instagram.com/tormenta_tormenta/" target="_blank" rel="noopener"><span class="item-name">tormenta</span></a>
        <a class="item" href="https://open.spotify.com/intl-es/artist/4EskZedbeDSe1AqjyxASl2" target="_blank" rel="noopener"><span class="item-name">christianes</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.2s">
      <div class="cat-col"><span class="cat-label">process</span></div>
      <div class="items-col">
        <a class="item" href="https://processdata.cl/" target="_blank" rel="noopener"><span class="item-name">processdata.cl</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.3s">
      <div class="cat-col"><span class="cat-label">ethereal</span></div>
      <div class="items-col">
        <a class="item" href="https://www.etherealart.online/" target="_blank" rel="noopener"><span class="item-name">etherealart.online</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.4s">
      <div class="cat-col"><span class="cat-label">ónyx</span></div>
      <div class="items-col">
        <a class="item" href="https://www.instagram.com/instalacion_onyx/" target="_blank" rel="noopener"><span class="item-name">instagram</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.5s">
      <div class="cat-col"><span class="cat-label">producciones</span></div>
      <div class="items-col">
        <a class="item" href="https://www.notion.so/342e603d505e80629d4cf51e05b90426?v=342e603d505e81fb91f7000c2ab1f636" target="_blank" rel="noopener"><span class="item-name">portafolio</span></a>
        <a class="item" href="https://estudionegro.io/cms/" target="_blank" rel="noopener"><span class="item-name">estudionegro</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.6s">
      <div class="cat-col"><span class="cat-label">bio</span></div>
      <div class="items-col">
        <a class="item" href="https://es.wikipedia.org/wiki/Cristi%C3%A1n_Heyne" target="_blank" rel="noopener"><span class="item-name">wiki</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.7s">
      <div class="cat-col"><span class="cat-label">contacto</span></div>
      <div class="items-col">
        <a class="item" href="mailto:cristianheyne@gmail.com"><span class="item-name">email</span></a>
      </div>
    </div>
  </div>

  <footer>
    <div class="visitor-box">
      visitante <span class="visitor-num" id="visitor-num">——</span>
    </div>
    <div class="meta">
      <span id="meta-ip">···</span><br>
      <span id="meta-loc">···</span> • <span id="meta-date">···</span> • <span id="meta-time">00:00:00</span>
    </div>
  </footer>
</main>

<script>
  function pad(n) { return String(n).padStart(2,'0'); }
  const DAYS = ['dom','lun','mar','mié','jue','vie','sáb'];
  const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  function tick() {
    const sgo = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Santiago'}));
    document.getElementById('meta-time').textContent = pad(sgo.getHours())+':'+pad(sgo.getMinutes())+':'+pad(sgo.getSeconds());
    document.getElementById('meta-date').textContent = DAYS[sgo.getDay()]+' '+pad(sgo.getDate())+' '+MONTHS[sgo.getMonth()]+' '+sgo.getFullYear();
  }
  tick(); setInterval(tick, 1000);

  async function geo() {
    try {
      const d = await (await fetch('https://ipapi.co/json/')).json();
      if (d && d.city) {
        document.getElementById('meta-loc').textContent = (d.city||'') + (d.country_code ? ', ' + d.country_code : '');
        document.getElementById('meta-ip').textContent = d.ip || '';
      }
    } catch(_) {}
  }
  
  async function counter() {
    try {
      const d = await (await fetch('https://countapi.mileshilliard.com/api/v1/hit/cristianheyne-xyz')).json();
      if (d && d.value != null)
        document.getElementById('visitor-num').textContent = Number(d.value).toLocaleString('es-CL');
    } catch(_) {}
  }

  geo(); counter();
</script>
</body>
</html>
