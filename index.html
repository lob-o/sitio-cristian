<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cristianheyne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px;
      line-height: 1.7;
      color: #000;
      background: #fff;
      padding: 44px 48px 80px;
      max-width: 600px;
    }

    h1 {
      font-size: 12px;
      font-weight: 400;
      margin-bottom: 56px;
    }

    .section {
      display: grid;
      grid-template-columns: 140px 1fr;
      margin-bottom: 28px;
      align-items: start;
    }

    .label {
      color: #999;
      padding-top: 1px;
    }

    .item {
      display: block;
      color: #000;
      text-decoration: none;
      line-height: 1.7;
    }

    .item:hover {
      text-decoration: underline;
    }

    #presence {
      margin-top: 80px;
      color: #999;
      font-size: 12px;
      line-height: 1.7;
      text-transform: lowercase;
    }

    @media (max-width: 480px) {
      body { padding: 32px 24px 64px; }
      .section { grid-template-columns: 1fr; gap: 4px; margin-bottom: 32px; }
      .label { color: #bbb; }
      #presence { margin-top: 64px; }
    }
  </style>
</head>
<body>

  <h1>cristián heyne</h1>

  <div class="section">
    <span class="label">música</span>
    <div>
      <a href="https://www.instagram.com/shogu_n__/" class="item">shogún</a>
      <a href="https://www.instagram.com/tormenta_tormenta/" class="item">tormenta</a>
      <a href="https://open.spotify.com/intl-es/artist/4EskZedbeDSe1AqjyxASl2" class="item">christianes</a>
    </div>
  </div>

  <div class="section">
    <span class="label">process</span>
    <div>
      <a href="https://processdata.cl/" class="item">processdata.cl</a>
    </div>
  </div>

  <div class="section">
    <span class="label">ethereal</span>
    <div>
      <a href="https://www.etherealart.online/" class="item">etherealart.online</a>
    </div>
  </div>

  <div class="section">
    <span class="label">ónyx</span>
    <div>
      <a href="https://www.instagram.com/instalacion_onyx/" class="item">instagram</a>
    </div>
  </div>

  <div class="section">
    <span class="label">producciones</span>
    <div>
      <a href="https://estudionegro.io/cms/" class="item">estudionegro</a>
    </div>
  </div>

  <div class="section">
    <span class="label">bio</span>
    <div>
      <a href="https://es.wikipedia.org/wiki/Cristi%C3%A1n_Heyne" class="item">wikipedia</a>
    </div>
  </div>

  <div class="section">
    <span class="label">contacto</span>
    <div>
      <a href="mailto:cristianheyne@gmail.com" class="item">email</a>
    </div>
  </div>

  <div id="presence">cargando...</div>

  <script>
    const el = document.getElementById("presence");

    const KEY = "ch_xyz_visits";
    let visits = parseInt(localStorage.getItem(KEY) || "0", 10) + 1;
    localStorage.setItem(KEY, String(visits));

    let city = "algún lugar";
    let mode = "location";

    function getTimeData() {
      const now = new Date();

      const time = now.toLocaleTimeString("es-CL", {
        hour12: false
      });

      const date = now.toLocaleDateString("es-CL");

      return { time, date };
    }

    async function getLocation() {
      try {
        const res = await fetch("https://ipwho.is/");
        const data = await res.json();

        if (data && data.success && data.city) {
          return data.city.toLowerCase();
        }

        return "algún lugar";
      } catch (err) {
        return "algún lugar";
      }
    }

    function renderLocation() {
      const { time, date } = getTimeData();
      const fail = Math.random() < 0.15;
      const displayCity = fail ? "algún lugar" : city;

      el.textContent = `usted está en ${displayCity} — ${time} — ${date}`;
    }

    function renderVisitor() {
      el.textContent = `usted es el visitante ${visits}`;
    }

    function tick() {
      if (mode === "location") {
        renderLocation();
      }
    }

    function scheduleVisitorMessage() {
      const delay = 20000 + Math.random() * 10000;

      setTimeout(() => {
        mode = "visitor";
        renderVisitor();

        setTimeout(() => {
          mode = "location";
          renderLocation();
          scheduleVisitorMessage();
        }, 4000);
      }, delay);
    }

    (async function init() {
      renderLocation();
      city = await getLocation();
      renderLocation();
      setInterval(tick, 1000);
      scheduleVisitorMessage();
    })();
  </script>

</body>
</html>
