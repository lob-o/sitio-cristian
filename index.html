<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cristián heyne</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --accent: #ff0000;
      --muted: #999999;
      --line: #e0e0e0;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-size: 13px;
      line-height: 1;
    }
 
    main {
      padding: clamp(2rem, 6vw, 5rem);
      max-width: 820px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    /* ── HEADER ── */
    header {
      margin-bottom: clamp(3rem, 10vh, 5rem);
    }
 
    .name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--fg);
    }
 
    .name::after {
      content: "";
      display: block;
      width: 4px;
      height: 4px;
      background: var(--accent);
      flex-shrink: 0;
    }
 
    /* ── TABLE ── */
    .table {
      display: flex;
      flex-direction: column;
    }
 
    .group {
      display: grid;
      grid-template-columns: 160px 1fr;
      align-items: baseline;
      border-top: 1px solid var(--line);
      padding: 1.4rem 0;
      gap: 1rem;
      opacity: 0;
      animation: reveal 0.5s ease forwards;
    }
 
    .group:last-child {
      border-bottom: 1px solid var(--line);
    }
 
    .cat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding-top: 3px;
    }
 
    .items-col {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
 
    .item {
      text-decoration: none;
      color: var(--fg);
      display: inline-flex;
      width: fit-content;
      transition: color 0.2s ease, transform 0.25s cubic-bezier(0.23, 1, 0.32, 1);
    }
 
    .item-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
 
    .item:hover {
      color: var(--accent);
      transform: translateX(6px);
    }
 
    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding-top: 4rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
 
    .visitor-box {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
 
    .visitor-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
 
    .visitor-num {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--fg);
    }
 
    .meta {
      font-size: 10px;
      text-align: right;
      font-weight: 500;
      line-height: 1.8;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }
 
    @keyframes reveal {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    @media (max-width: 600px) {
      .group {
        grid-template-columns: 1fr;
        gap: 0.5rem;
        padding: 1rem 0;
      }
      .cat-label {
        font-size: 10px;
      }
      .item-name {
        font-size: 14px;
      }
      footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 1.5rem;
      }
      .meta { text-align: left; }
    }
  </style>
</head>
<body>
<main>
 
  <header>
    <div class="name">cristián heyne</div>
  </header>
 
  <div class="table">
 
    <div class="group" style="animation-delay: 0.05s">
      <div class="cat-label">música</div>
      <div class="items-col">
        <a class="item" href="https://www.instagram.com/shogu_n__/" target="_blank" rel="noopener">
          <span class="item-name">shogun</span>
        </a>
        <a class="item" href="https://www.instagram.com/tormenta_tormenta/" target="_blank" rel="noopener">
          <span class="item-name">tormenta</span>
        </a>
        <a class="item" href="https://open.spotify.com/intl-es/artist/4EskZedbeDSe1AqjyxASl2" target="_blank" rel="noopener">
          <span class="item-name">christianes</span>
        </a>
      </div>
    </div>
 
    <div class="group" style="animation-delay: 0.12s">
      <div class="cat-label">process</div>
      <div class="items-col">
        <a class="item" href="https://processdata.cl/" target="_blank" rel="noopener">
          <span class="item-name">processdata.cl</span>
        </a>
      </div>
    </div>
 
    <div class="group" style="animation-delay: 0.19s">
      <div class="cat-label">ethereal</div>
      <div class="items-col">
        <a class="item" href="https://www.etherealart.online/" target="_blank" rel="noopener">
          <span class="item-name">etherealart.online</span>
        </a>
      </div>
    </div>
 
    <div class="group" style="animation-delay: 0.26s">
      <div class="cat-label">ónyx</div>
      <div class="items-col">
        <a class="item" href="https://www.instagram.com/instalacion_onyx/" target="_blank" rel="noopener">
          <span class="item-name">instagram</span>
        </a>
      </div>
    </div>
 
    <div class="group" style="animation-delay: 0.33s">
      <div class="cat-label">producciones</div>
      <div class="items-col">
        <a class="item" href="https://www.notion.so/342e603d505e80629d4cf51e05b90426?v=342e603d505e81fb91f7000c2ab1f636" target="_blank" rel="noopener">
          <span class="item-name">portafolio</span>
        </a>
        <a class="item" href="https://estudionegro.io/cms/" target="_blank" rel="noopener">
          <span class="item-name">estudionegro</span>
        </a>
      </div>
    </div>
 
    <div class="group" style="animation-delay: 0.40s">
      <div class="cat-label">bio</div>
      <div class="items-col">
        <a class="item" href="https://es.wikipedia.org/wiki/Cristi%C3%A1n_Heyne" target="_blank" rel="noopener">
          <span class="item-name">wiki</span>
        </a>
      </div>
    </div>
 
    <div class="group" style="animation-delay: 0.47s">
      <div class="cat-label">contacto</div>
      <div class="items-col">
        <a class="item" href="mailto:cristianheyne@gmail.com">
          <span class="item-name">email</span>
        </a>
      </div>
    </div>
 
  </div>
 
  <footer>
    <div class="visitor-box">
      <span class="visitor-label">visitante</span>
      <span class="visitor-num" id="visitor-num">——</span>
    </div>
    <div class="meta">
      <span id="meta-ip">···</span><br>
      <span id="meta-loc">···</span><br>
      <span id="meta-date">···</span> · <span id="meta-time">00:00:00</span>
    </div>
  </footer>
 
</main>
<script>
  function pad(n) { return String(n).padStart(2, '0'); }
  const DAYS   = ['dom','lun','mar','mié','jue','vie','sáb'];
  const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
 
  function tick() {
    const sgo = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Santiago' }));
    document.getElementById('meta-time').textContent =
      pad(sgo.getHours()) + ':' + pad(sgo.getMinutes()) + ':' + pad(sgo.getSeconds());
    document.getElementById('meta-date').textContent =
      DAYS[sgo.getDay()] + ' ' + pad(sgo.getDate()) + ' ' + MONTHS[sgo.getMonth()] + ' ' + sgo.getFullYear();
  }
  tick();
  setInterval(tick, 1000);
 
  async function geo() {
    try {
      const d = await (await fetch('https://ipapi.co/json/')).json();
      if (d && d.city) {
        document.getElementById('meta-loc').textContent =
          (d.city || '') + (d.country_code ? ', ' + d.country_code : '');
        document.getElementById('meta-ip').textContent = d.ip || '';
      }
    } catch (_) {}
  }
 
  async function counter() {
    try {
      const d = await (await fetch('https://countapi.mileshilliard.com/api/v1/hit/cristianheyne-xyz')).json();
      if (d && d.value != null)
        document.getElementById('visitor-num').textContent = Number(d.value).toLocaleString('es-CL');
    } catch (_) {}
  }
 
  geo();
  counter();
</script>
</body>
</html>
