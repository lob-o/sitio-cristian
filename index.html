<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cristián heyne</title>
  <style>
    :root {
      --bg: #fdfdfd;
      --fg: #000;
      --accent: #e63946; /* Rojo Bauhaus */
      --border: rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Inter", "Helvetica Neue", Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      overflow-x: hidden;
    }

    main {
      padding: clamp(2rem, 8vw, 6rem);
      max-width: 1400px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      margin-bottom: clamp(4rem, 15vh, 10rem);
    }

    .name {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: -0.02em;
      text-transform: lowercase;
      position: relative;
      display: inline-block;
    }

    .name::after {
      content: "";
      position: absolute;
      right: -15px;
      top: 50%;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* ── GRID SYSTEM ── */
    .table {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .group {
      display: grid;
      grid-template-columns: 1fr 2fr;
      border-top: 1px solid var(--fg);
      padding: 1.5rem 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .group:last-child {
      border-bottom: 1px solid var(--fg);
    }

    .cat-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #888;
    }

    .items-col {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .item {
      text-decoration: none;
      color: var(--fg);
      display: inline-flex;
      align-items: baseline;
      width: fit-content;
      position: relative;
      transition: transform 0.3s ease;
    }

    .item-name {
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      position: relative;
    }

    /* Hover Effect: Estilo Zen-Bauhaus */
    .item::before {
      content: "→";
      position: absolute;
      left: -30px;
      opacity: 0;
      transition: all 0.3s ease;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .item:hover {
      transform: translateX(35px);
    }

    .item:hover::before {
      opacity: 1;
    }

    .item:hover .item-name {
      color: var(--accent);
    }

    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding-top: 4rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: flex-end;
    }

    .visitor-box {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .visitor-num {
      display: block;
      font-size: 24px;
      font-weight: 900;
      margin-top: 5px;
    }

    .meta {
      font-size: 10px;
      text-align: right;
      font-weight: 500;
      line-height: 1.6;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .group {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .item:hover {
        transform: none;
      }
      footer {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .meta { text-align: left; }
    }

    /* Animación de entrada */
    .group {
      animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes reveal {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<main>
  <header>
    <div class="name">cristián heyne</div>
  </header>

  <section class="table">
    <div class="group" style="animation-delay: 0.1s">
      <div class="cat-col"><span class="cat-label">música</span></div>
      <div class="items-col">
        <a class="item" href="#"><span class="item-name">shogun</span></a>
        <a class="item" href="#"><span class="item-name">tormenta</span></a>
        <a class="item" href="#"><span class="item-name">christianes</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.2s">
      <div class="cat-col"><span class="cat-label">data</span></div>
      <div class="items-col">
        <a class="item" href="#"><span class="item-name">processdata.cl</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.3s">
      <div class="cat-col"><span class="cat-label">art</span></div>
      <div class="items-col">
        <a class="item" href="#"><span class="item-name">etherealart.online</span></a>
        <a class="item" href="#"><span class="item-name">ónyx</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.4s">
      <div class="cat-col"><span class="cat-label">estudio</span></div>
      <div class="items-col">
        <a class="item" href="#"><span class="item-name">portafolio</span></a>
        <a class="item" href="#"><span class="item-name">estudionegro</span></a>
      </div>
    </div>

    <div class="group" style="animation-delay: 0.5s">
      <div class="cat-col"><span class="cat-label">info</span></div>
      <div class="items-col">
        <a class="item" href="#"><span class="item-name">wikipedia</span></a>
        <a class="item" href="#"><span class="item-name">email</span></a>
      </div>
    </div>
  </section>

  <footer>
    <div class="visitor-box">
      Visitante No.
      <span class="visitor-num" id="visitor-num">002.341</span>
    </div>
    <div class="meta">
      <span id="meta-ip">186.11.23.104</span><br>
      <span id="meta-loc">SANTIAGO, CL</span> • <span id="meta-date">...</span> • <span id="meta-time">00:00:00</span>
    </div>
  </footer>
</main>

<script>
  // Script para el reloj y datos (mantenemos tu lógica funcional)
  function pad(n) { return String(n).padStart(2,'0'); }
  function tick() {
    const sgo = new Date();
    document.getElementById('meta-time').textContent = 
      pad(sgo.getHours())+':'+pad(sgo.getMinutes())+':'+pad(sgo.getSeconds());
    const options = { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' };
    document.getElementById('meta-date').textContent = sgo.toLocaleDateString('es-CL', options);
  }
  setInterval(tick, 1000); tick();
  
  // Aquí podrías reintegrar tus llamadas a la API de IP y contador
</script>

</body>
</html>
