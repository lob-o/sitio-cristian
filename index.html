<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cristián heyne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    html, body {
      width: 100%; min-height: 100%;
      background: #fff;
      color: #000;
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
 
    main {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: clamp(40px,6vw,80px) clamp(32px,7vw,96px);
      max-width: 1000px;
    }
 
    /* ── NAME ── */
    .name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0; animation: up 0.4s ease forwards 0.05s;
    }
 
    /* ── TABLE ── */
    .table {
      margin-top: clamp(40px,7vh,72px);
      width: 100%;
    }
 
    /* group = one category block */
    .group {
      display: grid;
      grid-template-columns: 160px 1fr;
      border-top: 2px solid #000;
      opacity: 0; animation: up 0.35s ease forwards;
    }
 
    .group:nth-child(1) { animation-delay: 0.10s; }
    .group:nth-child(2) { animation-delay: 0.17s; }
    .group:nth-child(3) { animation-delay: 0.24s; }
    .group:nth-child(4) { animation-delay: 0.31s; }
    .group:nth-child(5) { animation-delay: 0.38s; }
    .group:nth-child(6) { animation-delay: 0.45s; }
    .group:nth-child(7) { animation-delay: 0.52s; }
 
    /* last group gets border-bottom too */
    .table { border-bottom: 2px solid #000; }
 
    /* left col: category label — small, uppercase, fixed top */
    .cat-col {
      padding: 16px 24px 16px 0;
      border-right: 2px solid #000;
    }
 
    .cat-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.38);
      line-height: 1;
      display: block;
      margin-top: 4px; /* optical align with first item */
    }
 
    /* right col: items stacked */
    .items-col {
      display: flex;
      flex-direction: column;
    }
 
    .item {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: #000;
      padding: 0 0 0 28px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      transition: background 0.08s;
      cursor: pointer;
    }
 
    /* remove border from last item in group */
    .item:last-child { border-bottom: none; }
 
    .item:hover { background: #000; }
    .item:hover .item-name { color: #fff; }
 
    .item-name {
      font-size: clamp(18px, 2.4vw, 24px);
      font-weight: 700;
      letter-spacing: -0.01em;
      padding: 14px 0;
      transition: color 0.08s;
      line-height: 1;
    }
 
    /* ── FOOTER ── */
    footer {
      margin-top: clamp(36px,6vh,64px);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 12px;
      opacity: 0; animation: up 0.4s ease forwards 0.65s;
    }
 
    .visitor {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
    }
    .visitor strong { color: #000; }
 
    .meta {
      font-size: 10px;
      font-weight: 700;
      color: rgba(0,0,0,0.28);
      letter-spacing: 0.06em;
      text-align: right;
      line-height: 1.9;
      text-transform: uppercase;
    }
    .meta span { color: rgba(0,0,0,0.5); }
 
    @keyframes up {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
 
    @media (max-width: 520px) {
      .group { grid-template-columns: 90px 1fr; }
      .cat-col { padding-right: 16px; }
      .item { padding-left: 16px; }
      .item-name { font-size: 18px; }
      .meta { text-align: left; }
    }
  </style>
</head>
<body>
<main>
 
  <div>
    <div class="name">cristián heyne</div>
 
    <div class="table">
 
      <div class="group">
        <div class="cat-col"><span class="cat-label">música</span></div>
        <div class="items-col">
          <a class="item" href="https://www.instagram.com/shogu_n__/" target="_blank" rel="noopener">
            <span class="item-name">shogun</span>
          </a>
          <a class="item" href="https://www.instagram.com/tormenta_tormenta/" target="_blank" rel="noopener">
            <span class="item-name">tormenta</span>
          </a>
          <a class="item" href="https://open.spotify.com/intl-es/artist/4EskZedbeDSe1AqjyxASl2" target="_blank" rel="noopener">
            <span class="item-name">christianes</span>
          </a>
        </div>
      </div>
 
      <div class="group">
        <div class="cat-col"><span class="cat-label">process</span></div>
        <div class="items-col">
          <a class="item" href="https://processdata.cl/" target="_blank" rel="noopener">
            <span class="item-name">processdata.cl</span>
          </a>
        </div>
      </div>
 
      <div class="group">
        <div class="cat-col"><span class="cat-label">ethereal</span></div>
        <div class="items-col">
          <a class="item" href="https://www.etherealart.online/" target="_blank" rel="noopener">
            <span class="item-name">etherealart.online</span>
          </a>
        </div>
      </div>
 
      <div class="group">
        <div class="cat-col"><span class="cat-label">ónyx</span></div>
        <div class="items-col">
          <a class="item" href="https://www.instagram.com/instalacion_onyx/" target="_blank" rel="noopener">
            <span class="item-name">instagram</span>
          </a>
        </div>
      </div>
 
      <div class="group">
        <div class="cat-col"><span class="cat-label">producciones</span></div>
        <div class="items-col">
          <a class="item" href="https://www.notion.so/342e603d505e80629d4cf51e05b90426?v=342e603d505e81fb91f7000c2ab1f636" target="_blank" rel="noopener">
            <span class="item-name">portafolio</span>
          </a>
          <a class="item" href="https://estudionegro.io/cms/" target="_blank" rel="noopener">
            <span class="item-name">estudionegro</span>
          </a>
        </div>
      </div>
 
      <div class="group">
        <div class="cat-col"><span class="cat-label">bio</span></div>
        <div class="items-col">
          <a class="item" href="https://es.wikipedia.org/wiki/Cristi%C3%A1n_Heyne" target="_blank" rel="noopener">
            <span class="item-name">wiki</span>
          </a>
        </div>
      </div>
 
      <div class="group">
        <div class="cat-col"><span class="cat-label">contacto</span></div>
        <div class="items-col">
          <a class="item" href="mailto:cristianheyne@gmail.com">
            <span class="item-name">email</span>
          </a>
        </div>
      </div>
 
    </div>
  </div>
 
  <footer>
    <div class="visitor">visitante <strong id="visitor-num">——</strong></div>
    <div class="meta">
      <span id="meta-ip">···</span><br>
      <span id="meta-loc">···</span>&nbsp;·&nbsp;<span id="meta-date">···</span>&nbsp;·&nbsp;<span id="meta-time">--:--:--</span>
    </div>
  </footer>
 
</main>
<script>
  function pad(n) { return String(n).padStart(2,'0'); }
  const DAYS   = ['dom','lun','mar','mié','jue','vie','sáb'];
  const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
 
  function tick() {
    const sgo = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Santiago'}));
    document.getElementById('meta-time').textContent =
      pad(sgo.getHours())+':'+pad(sgo.getMinutes())+':'+pad(sgo.getSeconds());
    document.getElementById('meta-date').textContent =
      DAYS[sgo.getDay()]+' '+pad(sgo.getDate())+' '+MONTHS[sgo.getMonth()]+' '+sgo.getFullYear();
  }
  tick(); setInterval(tick, 1000);
 
  async function geo() {
    try {
      const d = await (await fetch('https://ip-api.com/json/?fields=status,city,countryCode,query')).json();
      if (d.status === 'success') {
        document.getElementById('meta-loc').textContent = (d.city||'')+(d.countryCode?', '+d.countryCode:'');
        document.getElementById('meta-ip').textContent  = d.query||'';
      }
    } catch(_) {}
  }
 
  async function counter() {
    try {
      const d = await (await fetch('https://api.countapi.xyz/hit/cristianheyne.xyz/visits')).json();
      if (d && d.value != null)
        document.getElementById('visitor-num').textContent = d.value.toLocaleString('es-CL');
    } catch(_) {}
  }
 
  geo(); counter();
</script>
</body>
</html>
