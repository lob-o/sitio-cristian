<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio — Cristián Heyne</title>
  <meta name="description" content="Portafolio de producciones de Cristián Heyne, 1993–2026.">
  <link rel="canonical" href="https://cristianheyne.xyz/portafolio">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <style>
    :root { --bg:#080808; --fg:#e0e0e0; --dim:#141414; --accent:#cc0000; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--fg);
      font-family:system-ui,-apple-system,sans-serif;
      font-size:11px; height:100vh; overflow:hidden;
      -webkit-font-smoothing:antialiased; user-select:none;
    }

    #hd {
      position:fixed; top:0; left:0; right:0; height:44px;
      border-bottom:1px solid var(--dim);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; z-index:20; background:var(--bg);
    }
    .hd-l { display:flex; align-items:center; gap:10px; }
    .dot { width:5px; height:5px; background:var(--accent); display:inline-block; }
    .lbl { font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
    .muted { color:#252525; }
    .hd-r { display:flex; align-items:center; gap:20px; }
    .modes { display:flex; gap:12px; }
    .mb {
      background:none; border:none; cursor:pointer;
      font:500 9px/1 inherit; letter-spacing:.1em; text-transform:uppercase;
      color:#282828; padding:0; transition:color .15s;
    }
    .mb.on { color:var(--accent); font-weight:700; }
    .mb:hover { color:#555; }
    .back {
      font-size:9px; letter-spacing:.1em; text-transform:uppercase;
      color:#1e1e1e; text-decoration:none; transition:color .15s;
    }
    .back:hover { color:#444; }

    #cv { position:fixed; top:44px; left:0; right:0; bottom:0; }
    #cv svg { width:100%; height:100%; cursor:grab; }
    #cv svg:active { cursor:grabbing; }

    /* Panel */
    #pnl {
      position:fixed; top:64px; right:24px; width:230px;
      background:#090909; border:1px solid var(--dim); padding:16px 18px;
      opacity:0; pointer-events:none;
      transform:translateX(8px);
      transition:opacity .2s ease, transform .2s ease; z-index:20;
    }
    #pnl.vis { opacity:1; pointer-events:all; transform:translateX(0); }

    .p-artist {
      font-size:12px; font-weight:800; letter-spacing:-.01em;
      color:var(--fg); margin-bottom:3px;
    }
    .p-title {
      font-size:12px; font-weight:500; letter-spacing:-.01em;
      color:#888; margin-bottom:12px;
    }
    .p-row {
      border-top:1px solid var(--dim); padding-top:8px;
      font-size:9px; letter-spacing:.08em; text-transform:uppercase;
      color:#222; line-height:1.9;
    }
    .p-score-wrap { margin-top:10px; border-top:1px solid var(--dim); padding-top:8px; }
    .p-score-label { font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:#1e1e1e; margin-bottom:4px; }
    .p-bar-bg { height:2px; background:var(--dim); }
    .p-bar-fill { height:2px; background:var(--accent); transition:width .4s ease; }
    .p-score-num { font-size:9px; font-weight:700; color:var(--accent); margin-top:3px; }
    .pc {
      background:none; border:none; cursor:pointer; font:inherit;
      font-size:8px; letter-spacing:.1em; text-transform:uppercase;
      color:#1a1a1a; padding:10px 0 0; display:block; transition:color .15s;
    }
    .pc:hover { color:#444; }

    /* Legend */
    #leg { position:fixed; bottom:22px; left:24px; display:flex; gap:16px; z-index:20; }
    .li { display:flex; align-items:center; gap:6px; }
    .ld { width:6px; height:6px; border-radius:50%; }
    .ll { font-size:8px; letter-spacing:.07em; text-transform:uppercase; color:#1c1c1c; }

    /* Tooltip */
    #tip {
      position:fixed; background:#0c0c0c; border:1px solid var(--dim);
      padding:7px 11px; pointer-events:none;
      opacity:0; transition:opacity .08s; z-index:30; max-width:200px;
    }
    #tip.vis { opacity:1; }
    .tt { font-size:11px; font-weight:700; line-height:1.2; margin-bottom:2px; }
    .ts { font-size:9px; color:#333; letter-spacing:.05em; }

    /* Overlay */
    #overlay {
      position:fixed; inset:44px 0 0 0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; z-index:10; pointer-events:none;
    }
    .ov-dots { display:flex; gap:5px; }
    .ov-dot { width:4px; height:4px; background:var(--accent); opacity:0; animation:pulse 1.2s ease infinite; }
    .ov-dot:nth-child(2) { animation-delay:.2s; }
    .ov-dot:nth-child(3) { animation-delay:.4s; }
    @keyframes pulse { 0%,100%{opacity:0} 50%{opacity:1} }
    .ov-msg { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:#1e1e1e; }
    .ov-err { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); }

    #hint { position:fixed; bottom:22px; right:24px; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:#141414; z-index:20; }
  </style>
</head>
<body>

<div id="hd">
  <div class="hd-l">
    <span class="lbl muted">portafolio</span>
    <span class="dot"></span>
    <span class="lbl">cristián heyne</span>
    <span class="lbl muted" id="cnt"></span>
  </div>
  <div class="hd-r">
    <div class="modes">
      <button class="mb on" data-m="artista">por artista</button>
      <button class="mb"    data-m="era">por era</button>
      <button class="mb"    data-m="formato">por formato</button>
    </div>
    <a href="/" class="back">← cristián heyne</a>
  </div>
</div>

<div id="cv"><svg id="g"></svg></div>

<div id="pnl">
  <div class="p-artist" id="p-artist"></div>
  <div class="p-title"  id="p-title"></div>
  <div class="p-row"    id="p-row"></div>
  <div class="p-score-wrap" id="p-score-wrap">
    <div class="p-score-label">impacto · spotify</div>
    <div class="p-bar-bg"><div class="p-bar-fill" id="p-bar"></div></div>
    <div class="p-score-num"  id="p-score-num"></div>
  </div>
  <button class="pc" id="pc">cerrar ×</button>
</div>

<div id="leg">
  <div class="li"><div class="ld" style="background:#5555bb33;border:1px solid #5555bb66"></div><span class="ll">90s</span></div>
  <div class="li"><div class="ld" style="background:#bb991133;border:1px solid #bb991166"></div><span class="ll">00s</span></div>
  <div class="li"><div class="ld" style="background:#11996633;border:1px solid #11996666"></div><span class="ll">10s</span></div>
  <div class="li"><div class="ld" style="background:#bb222233;border:1px solid #bb222266"></div><span class="ll">20s</span></div>
</div>

<div id="overlay">
  <div class="ov-dots"><div class="ov-dot"></div><div class="ov-dot"></div><div class="ov-dot"></div></div>
  <div class="ov-msg" id="ov-msg">cargando portafolio</div>
</div>

<div id="hint">clic · arrastrar · scroll</div>
<div id="tip"><div class="tt" id="tt"></div><div class="ts" id="ts"></div></div>

<script>
const DC = { 1990:'#5555bb', 2000:'#bb9911', 2010:'#119966', 2020:'#bb2222' };
const CINE_COLOR = '#aa55cc';

function decOf(y)  { return Math.floor((y||2000)/10)*10; }
function dCol(y)   { return DC[decOf(y)] || '#666'; }
function isCine(d) { return (d.format||'').toLowerCase().includes('banda sonora'); }

function nodeColor(d, m) {
  if (isCine(d)) return CINE_COLOR;
  if (m === 'formato') return fCol(d.format);
  return dCol(d.year);
}

function fCol(f) {
  const u = (f||'').toLowerCase();
  if (u.includes('lp'))          return '#cc0000';
  if (u.includes('ep'))          return '#cc7700';
  if (u.includes('single'))      return '#ccaa00';
  if (u.includes('remix')||u.includes('rework')) return '#0088cc';
  if (u.includes('banda sonora')) return CINE_COLOR;
  return '#555555';
}

function fKey(f) {
  const u = (f||'').toLowerCase();
  if (u.includes('lp'))          return 'lp';
  if (u.includes('ep'))          return 'ep';
  if (u.includes('single'))      return 'single';
  if (u.includes('remix')||u.includes('rework')) return 'remix';
  if (u.includes('banda sonora')) return 'cine';
  return 'otro';
}

function nodeR(d) {
  if (d.isHub) return 16;
  // base size by format, scaled up if Spotify score available
  const base = { lp:7, ep:6, single:5, remix:5.5, cine:7, otro:5 }[fKey(d.format)] || 5.5;
  if (d.spotifyScore != null) {
    return base + (d.spotifyScore / 100) * 8;
  }
  return base;
}

let mode='artista', selId=null, hovArtist=null, sim=null, DATA=[];

const svg   = d3.select('#g');
const gRoot = svg.append('g');
const gL    = gRoot.append('g');
const gN    = gRoot.append('g');

svg.call(d3.zoom().scaleExtent([0.06,8]).on('zoom', e => gRoot.attr('transform', e.transform)));
svg.on('click', () => { selId=null; hovArtist=null; showPanel(null); applyHighlight(); });

async function load() {
  try {
    const r = await fetch('/api/portfolio');
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || r.statusText);
    DATA = j.entries || [];
    document.getElementById('cnt').textContent = '· ' + DATA.length;
    document.getElementById('overlay').style.display = 'none';
    render(mode);
  } catch(e) {
    const ov = document.getElementById('overlay');
    ov.innerHTML = `<div class="ov-err">error: ${e.message}</div>`;
  }
}

function buildGraph(data, m) {
  const nodes = data.map(d => ({...d}));
  const links = [];

  if (m === 'artista') {
    const g = {};
    nodes.forEach(n => { (g[n.artist] = g[n.artist]||[]).push(n); });
    Object.values(g).forEach(arr => {
      const s = [...arr].sort((a,b)=>(a.year||0)-(b.year||0));
      for (let i=0; i<s.length-1; i++) links.push({source:s[i].id, target:s[i+1].id, artist:s[i].artist});
    });

    // Extra attraction for cine nodes
    const cineNodes = nodes.filter(n => isCine(n));
    for (let i=0; i<cineNodes.length-1; i++) {
      links.push({source:cineNodes[i].id, target:cineNodes[i+1].id, isCine:true, strength:0.15});
    }

  } else if (m === 'era') {
    [...new Set(nodes.map(n=>decOf(n.year)))].forEach(d => {
      nodes.push({id:`h${d}`,artist:`${d}s`,year:d+5,format:'hub',role:'hub',title:`${d}s`,isHub:true});
    });
    nodes.forEach(n => { if (!n.isHub) links.push({source:n.id,target:`h${decOf(n.year)}`}); });
    // Cine cluster hub
    const cineNodes = nodes.filter(n => isCine(n));
    if (cineNodes.length) {
      nodes.push({id:'hcine',artist:'cine',year:2005,format:'hub',role:'hub',title:'cine',isHub:true,isCineHub:true});
      cineNodes.forEach(n => links.push({source:n.id,target:'hcine',strength:0.5}));
    }

  } else {
    [...new Set(nodes.map(n=>fKey(n.format)))].forEach(f => {
      nodes.push({id:`hf${f}`,artist:f.toUpperCase(),year:2000,format:'hub',role:'hub',title:f.toUpperCase(),isHub:true,hf:f});
    });
    nodes.forEach(n => { if (!n.isHub) links.push({source:n.id,target:`hf${fKey(n.format)}`}); });
  }

  return {nodes, links};
}

let currentNodes = [], currentLinks = [];

function render(m) {
  const W = document.getElementById('cv').clientWidth;
  const H = document.getElementById('cv').clientHeight;
  const {nodes, links} = buildGraph(DATA, m);
  currentNodes = nodes; currentLinks = links;

  if (sim) sim.stop();
  gL.selectAll('*').remove();
  gN.selectAll('*').remove();

  const lSel = gL.selectAll('line').data(links).join('line')
    .attr('stroke','#181818')
    .attr('stroke-width', d => d.isCine ? 0.5 : 0.8)
    .attr('stroke-opacity', d => d.isCine ? 0.3 : 0.85);

  const nSel = gN.selectAll('g').data(nodes, d=>d.id).join('g')
    .style('cursor', d => d.isHub ? 'default':'pointer');

  nSel.append('circle')
    .attr('r', d => nodeR(d))
    .attr('fill', d => {
      if (d.isHub) return 'transparent';
      return nodeColor(d, m) + '2e';
    })
    .attr('stroke', d => {
      if (d.isHub) return (d.isCineHub ? CINE_COLOR : (d.hf ? fCol(d.format) : dCol(d.year))) + '55';
      return nodeColor(d, m) + '77';
    })
    .attr('stroke-width', 1)
    .attr('stroke-dasharray', d => d.isHub ? '3 2' : 'none');

  nSel.filter(d=>d.isHub).append('text')
    .text(d=>d.title)
    .attr('text-anchor','middle').attr('dy','0.35em')
    .attr('fill', d => d.isCineHub ? CINE_COLOR : (d.hf ? fCol(d.format) : dCol(d.year)))
    .attr('font-size','8px').attr('font-weight','700').attr('letter-spacing','0.1em')
    .attr('pointer-events','none');

  nSel.filter(d=>!d.isHub)
    .on('click', (e,d) => {
      e.stopPropagation();
      selId   = selId===d.id ? null : d.id;
      hovArtist = selId ? d.artist : null;
      showPanel(selId ? d : null);
      applyHighlight();
    })
    .on('mouseenter', (e,d) => {
      showTip(e,d);
      hovArtist = d.artist;
      applyHighlight();
    })
    .on('mousemove', moveTip)
    .on('mouseleave', (e,d) => {
      hideTip();
      if (!selId) hovArtist = null;
      else hovArtist = DATA.find(x=>x.id===selId)?.artist || null;
      applyHighlight();
    })
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.08).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0.003); d.fx=null; d.fy=null; })
    );

  sim = d3.forceSimulation(nodes)
    .alphaMin(0.003)     // never fully stops — perpetual subtle motion
    .alphaDecay(0.015)
    .velocityDecay(0.35)
    .force('link', d3.forceLink(links).id(d=>d.id)
      .distance(d => {
        if (d.isCine) return 40;
        return (d.source?.isHub||d.target?.isHub) ? 85 : 52;
      })
      .strength(d => d.strength || ((d.source?.isHub||d.target?.isHub) ? 0.35 : 0.5))
    )
    .force('charge', d3.forceManyBody().strength(d=>d.isHub?-450:-110).distanceMax(280))
    .force('center', d3.forceCenter(W/2,H/2).strength(0.035))
    .force('collision', d3.forceCollide(d=>nodeR(d)+5).iterations(3))
    // Gentle random perturbation to keep nodes alive
    .force('jitter', () => {
      nodes.forEach(n => {
        if (!n.isHub && !n.fx) {
          n.vx += (Math.random()-0.5)*0.08;
          n.vy += (Math.random()-0.5)*0.08;
        }
      });
    })
    .on('tick', () => {
      lSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
          .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nSel.attr('transform', d=>`translate(${d.x},${d.y})`);
      applyHighlight();
    });
}

// Highlight: illuminate artist chain, dim everything else
function applyHighlight() {
  const activeArtist = hovArtist;

  gN.selectAll('g').each(function(d) {
    if (d.isHub) return;
    const circ = d3.select(this).select('circle');
    const c = nodeColor(d, mode);

    if (!activeArtist) {
      // no hover — everything normal
      circ.attr('fill', c+'2e').attr('stroke', c+'77').attr('r', nodeR(d));
    } else if (d.artist === activeArtist) {
      // same artist — illuminate
      circ.attr('fill', d.id===selId ? c : c+'66')
          .attr('stroke', c+'ee')
          .attr('r', nodeR(d) + (d.id===selId ? 2 : 1));
    } else {
      // different artist — dim
      circ.attr('fill', c+'0a').attr('stroke', c+'18').attr('r', nodeR(d));
    }
  });

  gL.selectAll('line').each(function(d) {
    const link = d3.select(this);
    if (!activeArtist) {
      link.attr('stroke','#181818').attr('stroke-opacity', d.isCine ? 0.3 : 0.85);
    } else if (d.artist === activeArtist) {
      link.attr('stroke','#555').attr('stroke-opacity',1);
    } else {
      link.attr('stroke','#0e0e0e').attr('stroke-opacity',0.2);
    }
  });
}

function showPanel(d) {
  const p = document.getElementById('pnl');
  if (!d) { p.classList.remove('vis'); return; }
  document.getElementById('p-artist').textContent = d.artist || '—';
  document.getElementById('p-title').textContent  = [d.year, d.format].filter(Boolean).join(' · ') + (d.title ? ' — ' + d.title : '');
  document.getElementById('p-row').textContent    = d.role || '—';

  const scoreWrap = document.getElementById('p-score-wrap');
  if (d.spotifyScore != null) {
    document.getElementById('p-bar').style.width    = d.spotifyScore + '%';
    document.getElementById('p-score-num').textContent = d.spotifyScore + ' / 100';
    scoreWrap.style.display = 'block';
  } else {
    scoreWrap.style.display = 'none';
  }
  p.classList.add('vis');
}
document.getElementById('pc').onclick = () => { selId=null; hovArtist=null; showPanel(null); applyHighlight(); };

const tip = document.getElementById('tip');
function showTip(e,d) {
  document.getElementById('tt').textContent = d.artist;
  document.getElementById('ts').textContent = [d.title, d.year].filter(Boolean).join(' · ');
  tip.classList.add('vis'); moveTip(e);
}
function moveTip(e) {
  tip.style.left = Math.min(e.clientX+14, innerWidth-210)+'px';
  tip.style.top  = Math.max(e.clientY-10, 50)+'px';
}
function hideTip() { tip.classList.remove('vis'); }

document.querySelectorAll('.mb').forEach(b => {
  b.onclick = () => {
    mode=b.dataset.m;
    document.querySelectorAll('.mb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    selId=null; hovArtist=null; showPanel(null);
    if (DATA.length) render(mode);
  };
});

window.addEventListener('resize', () => { if(DATA.length) render(mode); });
load();
</script>
</body>
</html>
