<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio — Cristián Heyne</title>
  <meta name="description" content="Portafolio de producciones de Cristián Heyne, 1993–2026.">
  <link rel="canonical" href="https://cristianheyne.xyz/portafolio">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <style>
    :root { --bg:#080808; --fg:#ffffff; --dim:#1e1e1e; --accent:#cc0000; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--fg);
      font-family:system-ui,-apple-system,sans-serif;
      font-size:11px; height:100vh; overflow:hidden;
      -webkit-font-smoothing:antialiased; user-select:none;
    }

    #hd {
      position:fixed; top:0; left:0; right:0; height:44px;
      border-bottom:1px solid var(--dim);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; z-index:20; background:var(--bg);
    }
    .hd-l { display:flex; align-items:center; gap:10px; }
    .dot { width:5px; height:5px; background:var(--accent); display:inline-block; }
    .lbl { font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
    .muted { color:#333; }
    .hd-r { display:flex; align-items:center; gap:20px; }
    .modes { display:flex; gap:12px; }
    .mb {
      background:none; border:none; cursor:pointer;
      font:500 9px/1 inherit; letter-spacing:.1em; text-transform:uppercase;
      color:#444; padding:0; transition:color .15s;
    }
    .mb.on { color:var(--accent); font-weight:700; }
    .mb:hover { color:#aaa; }
    .back {
      font-size:9px; letter-spacing:.1em; text-transform:uppercase;
      color:#333; text-decoration:none; transition:color .15s;
    }
    .back:hover { color:#aaa; }

    #cv { position:fixed; top:44px; left:0; right:0; bottom:0; }
    #cv svg { width:100%; height:100%; cursor:grab; }
    #cv svg:active { cursor:grabbing; }

    /* ── Tooltip ── */
    #tip {
      position:fixed;
      background:#111;
      border:1px solid #2a2a2a;
      padding:12px 16px;
      pointer-events:none;
      opacity:0;
      transition:opacity .15s;
      z-index:30;
      max-width:260px;
      min-width:160px;
    }
    #tip.vis { opacity:1; }
    .tip-artist {
      font-size:15px; font-weight:800; color:#ffffff;
      letter-spacing:-.02em; line-height:1.1;
      margin-bottom:4px;
    }
    .tip-title {
      font-size:14px; font-weight:500; color:#ffffff;
      letter-spacing:-.01em; line-height:1.2;
      margin-bottom:8px;
    }
    .tip-meta {
      font-size:11px; font-weight:700;
      letter-spacing:.04em;
      margin-bottom:4px;
    }
    .tip-role {
      font-size:10px; font-weight:400; color:#777;
      letter-spacing:.06em; text-transform:uppercase;
      line-height:1.5;
    }

    /* ── Side panel ── */
    #pnl {
      position:fixed; top:64px; right:24px; width:240px;
      background:#0f0f0f; border:1px solid #222; padding:18px 20px;
      opacity:0; pointer-events:none;
      transform:translateX(8px);
      transition:opacity .25s ease, transform .25s ease; z-index:20;
    }
    #pnl.vis { opacity:1; pointer-events:all; transform:translateX(0); }
    .p-artist { font-size:15px; font-weight:800; color:#fff; margin-bottom:3px; letter-spacing:-.02em; }
    .p-title  { font-size:14px; font-weight:500; color:#fff; margin-bottom:10px; letter-spacing:-.01em; }
    .p-meta   { font-size:11px; font-weight:700; margin-bottom:6px; }
    .p-role   { font-size:10px; color:#666; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px; }
    .p-divider { border:none; border-top:1px solid #1e1e1e; margin:10px 0; }
    .p-score-label { font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:#333; margin-bottom:5px; }
    .p-bar-bg   { height:2px; background:#1e1e1e; }
    .p-bar-fill { height:2px; background:var(--accent); transition:width .4s ease; }
    .p-score-num { font-size:10px; font-weight:700; color:var(--accent); margin-top:4px; }
    .pc {
      background:none; border:none; cursor:pointer; font:inherit;
      font-size:8px; letter-spacing:.12em; text-transform:uppercase;
      color:#333; padding:12px 0 0; display:block; transition:color .15s;
    }
    .pc:hover { color:#aaa; }

    #leg { position:fixed; bottom:22px; left:24px; display:flex; gap:16px; z-index:20; }
    .li { display:flex; align-items:center; gap:6px; }
    .ld { width:7px; height:7px; border-radius:50%; }
    .ll { font-size:9px; letter-spacing:.07em; text-transform:uppercase; color:#333; }

    #overlay {
      position:fixed; inset:44px 0 0 0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; z-index:10; pointer-events:none;
    }
    .ov-dots { display:flex; gap:5px; }
    .ov-dot { width:4px; height:4px; background:var(--accent); opacity:0; animation:pulse 1.2s ease infinite; }
    .ov-dot:nth-child(2) { animation-delay:.2s; }
    .ov-dot:nth-child(3) { animation-delay:.4s; }
    @keyframes pulse { 0%,100%{opacity:0} 50%{opacity:1} }
    .ov-msg { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:#333; }
    .ov-err { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); }

    #hint { position:fixed; bottom:22px; right:24px; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:#222; z-index:20; }
  </style>
</head>
<body>

<div id="hd">
  <div class="hd-l">
    <span class="lbl muted">portafolio</span>
    <span class="dot"></span>
    <span class="lbl">cristián heyne</span>
    <span class="lbl muted" id="cnt"></span>
  </div>
  <div class="hd-r">
    <div class="modes">
      <button class="mb on" data-m="artista">por artista</button>
      <button class="mb"    data-m="era">por era</button>
      <button class="mb"    data-m="formato">por formato</button>
    </div>
    <a href="https://cristianheyne.xyz" class="back">← cristián heyne</a>
  </div>
</div>

<div id="cv"><svg id="g"></svg></div>

<!-- Tooltip on hover -->
<div id="tip">
  <div class="tip-artist" id="tip-artist"></div>
  <div class="tip-title"  id="tip-title"></div>
  <div class="tip-meta"   id="tip-meta"></div>
  <div class="tip-role"   id="tip-role"></div>
</div>

<!-- Side panel on click -->
<div id="pnl">
  <div class="p-artist" id="p-artist"></div>
  <div class="p-title"  id="p-title"></div>
  <div class="p-meta"   id="p-meta"></div>
  <div class="p-role"   id="p-role"></div>
  <hr class="p-divider">
  <div class="p-score-wrap" id="p-score-wrap">
    <div class="p-score-label">impacto · spotify</div>
    <div class="p-bar-bg"><div class="p-bar-fill" id="p-bar"></div></div>
    <div class="p-score-num" id="p-score-num"></div>
  </div>
  <button class="pc" id="pc">cerrar ×</button>
</div>

<div id="leg">
  <div class="li"><div class="ld" style="background:#6655ee;opacity:.7"></div><span class="ll">90s</span></div>
  <div class="li"><div class="ld" style="background:#ddaa00;opacity:.7"></div><span class="ll">00s</span></div>
  <div class="li"><div class="ld" style="background:#00cc77;opacity:.7"></div><span class="ll">10s</span></div>
  <div class="li"><div class="ld" style="background:#ee3333;opacity:.7"></div><span class="ll">20s</span></div>
</div>

<div id="overlay">
  <div class="ov-dots"><div class="ov-dot"></div><div class="ov-dot"></div><div class="ov-dot"></div></div>
  <div class="ov-msg" id="ov-msg">cargando portafolio</div>
</div>

<div id="hint">clic · arrastrar · scroll</div>

<script>
const DC = { 1990:'#6655ee', 2000:'#ddaa00', 2010:'#00cc77', 2020:'#ee3333' };
const CINE_COLOR = '#cc55ff';

const T_IN  = 280;
const T_OUT = 480;

// Opacity levels — much brighter than before
const FILL_BASE  = '40';
const FILL_HOVER = '77';
const FILL_CLICK = 'bb';
const FILL_DIM   = '0c';
const STR_BASE   = '99';
const STR_HOVER  = 'dd';
const STR_CLICK  = 'ff';
const STR_DIM    = '18';
const LINE_BASE  = 0.65;
const LINE_HOVER = 1;
const LINE_DIM   = 0.06;

function decOf(y)  { return Math.floor((y||2000)/10)*10; }
function dCol(y)   { return DC[decOf(y)] || '#888'; }
function isCine(d) { return (d.format||'').toLowerCase().includes('banda sonora'); }

function nodeColor(d, m) {
  if (isCine(d)) return CINE_COLOR;
  if (m==='formato') return fCol(d.format);
  return dCol(d.year);
}

function fCol(f) {
  const u = (f||'').toLowerCase();
  if (u.includes('lp'))                          return '#ff2222';
  if (u.includes('ep'))                          return '#ff8800';
  if (u.includes('single'))                      return '#ffcc00';
  if (u.includes('remix')||u.includes('rework')) return '#0099ff';
  if (u.includes('banda sonora'))                return CINE_COLOR;
  return '#888888';
}

function fKey(f) {
  const u = (f||'').toLowerCase();
  if (u.includes('lp'))                          return 'lp';
  if (u.includes('ep'))                          return 'ep';
  if (u.includes('single'))                      return 'single';
  if (u.includes('remix')||u.includes('rework')) return 'remix';
  if (u.includes('banda sonora'))                return 'cine';
  return 'otro';
}

function nodeR(d) {
  if (d.isHub) return 18;
  const base = { lp:8, ep:7, single:6, remix:6.5, cine:8, otro:6 }[fKey(d.format)] || 6;
  return d.spotifyScore!=null ? base + (d.spotifyScore/100)*10 : base;
}

let mode='artista', selId=null, activeArtist=null, sim=null, DATA=[];

const svg   = d3.select('#g');
const gRoot = svg.append('g');
const gL    = gRoot.append('g');
const gN    = gRoot.append('g');

svg.call(d3.zoom().scaleExtent([0.06,8]).on('zoom',e=>gRoot.attr('transform',e.transform)));
svg.on('click',()=>{ selId=null; activeArtist=null; showPanel(null); applyHL(T_OUT); });

async function load() {
  // Count this visit same as the main site
  fetch('https://countapi.mileshilliard.com/api/v1/hit/cristianheyne-xyz').catch(()=>{});

  try {
    const r = await fetch('/api/portfolio');
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||r.statusText);
    DATA = j.entries||[];
    document.getElementById('cnt').textContent = '· '+DATA.length;
    document.getElementById('overlay').style.display='none';
    render(mode);
  } catch(e) {
    document.getElementById('overlay').innerHTML=`<div class="ov-err">error: ${e.message}</div>`;
  }
}

function buildGraph(data, m) {
  const nodes = data.map(d=>({...d}));
  const links = [];

  if (m==='artista') {
    const g={};
    nodes.forEach(n=>{ (g[n.artist]=g[n.artist]||[]).push(n); });
    Object.values(g).forEach(arr=>{
      const s=[...arr].sort((a,b)=>(a.year||0)-(b.year||0));
      for(let i=0;i<s.length-1;i++)
        links.push({source:s[i].id,target:s[i+1].id,artist:s[i].artist});
    });
    const cine=nodes.filter(n=>isCine(n));
    for(let i=0;i<cine.length-1;i++)
      links.push({source:cine[i].id,target:cine[i+1].id,isCine:true,strength:0.12});

  } else if (m==='era') {
    [...new Set(nodes.map(n=>decOf(n.year)))].forEach(d=>{
      nodes.push({id:`h${d}`,artist:`${d}s`,year:d+5,format:'hub',role:'hub',title:`${d}s`,isHub:true});
    });
    nodes.forEach(n=>{ if(!n.isHub) links.push({source:n.id,target:`h${decOf(n.year)}`}); });
    const cine=nodes.filter(n=>isCine(n));
    if(cine.length){
      nodes.push({id:'hcine',artist:'cine',year:2005,format:'hub',role:'hub',title:'cine',isHub:true,isCineHub:true});
      cine.forEach(n=>links.push({source:n.id,target:'hcine',strength:0.5}));
    }

  } else {
    [...new Set(nodes.map(n=>fKey(n.format)))].forEach(f=>{
      nodes.push({id:`hf${f}`,artist:f.toUpperCase(),year:2000,format:'hub',role:'hub',title:f.toUpperCase(),isHub:true,hf:f});
    });
    nodes.forEach(n=>{ if(!n.isHub) links.push({source:n.id,target:`hf${fKey(n.format)}`}); });
  }

  return {nodes,links};
}

function render(m) {
  const W=document.getElementById('cv').clientWidth;
  const H=document.getElementById('cv').clientHeight;
  const {nodes,links}=buildGraph(DATA,m);

  if(sim) sim.stop();
  gL.selectAll('*').remove();
  gN.selectAll('*').remove();

  const lSel=gL.selectAll('line').data(links).join('line')
    .attr('stroke','#222')
    .attr('stroke-width',d=>d.isCine?0.6:1)
    .attr('stroke-opacity',LINE_BASE);

  const nSel=gN.selectAll('g').data(nodes,d=>d.id).join('g')
    .style('cursor',d=>d.isHub?'default':'pointer');

  nSel.append('circle')
    .attr('r',d=>nodeR(d))
    .attr('fill',d=>d.isHub?'transparent':nodeColor(d,m)+FILL_BASE)
    .attr('stroke',d=>{
      if(d.isHub) return (d.isCineHub?CINE_COLOR:(d.hf?fCol(d.format):dCol(d.year)))+'77';
      return nodeColor(d,m)+STR_BASE;
    })
    .attr('stroke-width',1.5)
    .attr('stroke-dasharray',d=>d.isHub?'3 2':'none');

  nSel.filter(d=>d.isHub).append('text')
    .text(d=>d.title)
    .attr('text-anchor','middle').attr('dy','0.35em')
    .attr('fill',d=>d.isCineHub?CINE_COLOR:(d.hf?fCol(d.format):dCol(d.year)))
    .attr('font-size','9px').attr('font-weight','700').attr('letter-spacing','0.1em')
    .attr('pointer-events','none');

  nSel.filter(d=>!d.isHub)
    .on('click',(e,d)=>{
      e.stopPropagation();
      selId=selId===d.id?null:d.id;
      activeArtist=selId?d.artist:null;
      hideTip(); // always hide tooltip on click
      showPanel(selId?d:null);
      applyHL(T_IN);
    })
    .on('mouseenter',(e,d)=>{
      if(!window.matchMedia('(hover:none)').matches) showTip(e,d);
      activeArtist=d.artist; applyHL(T_IN);
    })
    .on('mousemove',(e)=>{ if(!window.matchMedia('(hover:none)').matches) moveTip(e); })
    .on('mouseleave',()=>{
      hideTip();
      activeArtist=selId?DATA.find(x=>x.id===selId)?.artist||null:null;
      applyHL(T_OUT);
    })
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.08).restart(); d.fx=d.x;d.fy=d.y; })
      .on('drag', (e,d)=>{ d.fx=e.x;d.fy=e.y; })
      .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0.003); d.fx=null;d.fy=null; })
    );

  sim=d3.forceSimulation(nodes)
    .alphaMin(0.003).alphaDecay(0.015).velocityDecay(0.35)
    .force('link',d3.forceLink(links).id(d=>d.id)
      .distance(d=>d.isCine?40:(d.source?.isHub||d.target?.isHub)?90:55)
      .strength(d=>d.strength||((d.source?.isHub||d.target?.isHub)?0.35:0.5))
    )
    .force('charge',d3.forceManyBody().strength(d=>d.isHub?-500:-130).distanceMax(300))
    .force('center',d3.forceCenter(W/2,H/2).strength(0.035))
    .force('collision',d3.forceCollide(d=>nodeR(d)+6).iterations(3))
    .force('jitter',()=>{
      nodes.forEach(n=>{ if(!n.isHub&&!n.fx){n.vx+=(Math.random()-.5)*.06;n.vy+=(Math.random()-.5)*.06;} });
    })
    .on('tick',()=>{
      lSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
          .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nSel.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
}

function applyHL(dur) {
  const artist=activeArtist;
  const ease=d3.easeCubicOut;

  gN.selectAll('g').each(function(d){
    if(d.isHub) return;
    const c=nodeColor(d,mode);
    const same=artist&&d.artist===artist;
    const sel=d.id===selId;
    let fill,stroke,r;
    if(!artist){
      fill=c+FILL_BASE; stroke=c+STR_BASE; r=nodeR(d);
    } else if(same){
      fill=c+(sel?FILL_CLICK:FILL_HOVER);
      stroke=c+(sel?STR_CLICK:STR_HOVER);
      r=nodeR(d)+(sel?2.5:1);
    } else {
      fill=c+FILL_DIM; stroke=c+STR_DIM; r=nodeR(d);
    }
    d3.select(this).select('circle')
      .transition().duration(dur).ease(ease)
      .attr('fill',fill).attr('stroke',stroke).attr('r',r);
  });

  gL.selectAll('line').each(function(d){
    const same=artist&&d.artist===artist;
    d3.select(this)
      .transition().duration(dur).ease(ease)
      .attr('stroke',same?'#777':'#1e1e1e')
      .attr('stroke-opacity',!artist?LINE_BASE:same?LINE_HOVER:LINE_DIM);
  });
}

// ── Tooltip ──────────────────────────────────────────────────────────────────
const tip=document.getElementById('tip');

function showTip(e,d) {
  const c = nodeColor(d, mode);
  document.getElementById('tip-artist').textContent = d.artist||'—';
  document.getElementById('tip-title').textContent  = d.title||'—';
  document.getElementById('tip-meta').style.color   = c;
  document.getElementById('tip-meta').textContent   = [d.year, d.format].filter(Boolean).join(' · ');
  document.getElementById('tip-role').textContent   = d.role||'';
  tip.classList.add('vis');
  moveTip(e);
}
function moveTip(e) {
  const x=e.clientX+16, y=e.clientY-10;
  tip.style.left=Math.min(x,innerWidth-270)+'px';
  tip.style.top =Math.max(y,54)+'px';
}
function hideTip() { tip.classList.remove('vis'); }

// ── Side panel ───────────────────────────────────────────────────────────────
function showPanel(d) {
  const p=document.getElementById('pnl');
  if(!d){ p.classList.remove('vis'); return; }
  const c=nodeColor(d,mode);
  document.getElementById('p-artist').textContent   = d.artist||'—';
  document.getElementById('p-title').textContent    = d.title||'—';
  document.getElementById('p-meta').textContent     = [d.year,d.format].filter(Boolean).join(' · ');
  document.getElementById('p-meta').style.color     = c;
  document.getElementById('p-role').textContent     = d.role||'—';
  const sw=document.getElementById('p-score-wrap');
  if(d.spotifyScore!=null){
    document.getElementById('p-bar').style.width      = d.spotifyScore+'%';
    document.getElementById('p-score-num').textContent = d.spotifyScore+' / 100';
    sw.style.display='block';
  } else { sw.style.display='none'; }
  p.classList.add('vis');
}
document.getElementById('pc').onclick=()=>{ selId=null;activeArtist=null;showPanel(null);applyHL(T_OUT); };

// ── Mode switch ───────────────────────────────────────────────────────────────
document.querySelectorAll('.mb').forEach(b=>{
  b.onclick=()=>{
    mode=b.dataset.m;
    document.querySelectorAll('.mb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    selId=null;activeArtist=null;showPanel(null);
    if(DATA.length) render(mode);
  };
});

window.addEventListener('resize',()=>{ if(DATA.length) render(mode); });
load();
</script>
</body>
</html>
