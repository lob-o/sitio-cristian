<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>chile</title>
  <style>
    :root {
      --bg: #0a0a0a; --fg: #e8e8e0; --muted: #888880;
      --accent: #c8b89a; --dim: #aaaa9e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: var(--bg); color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }
    #canvas-bg { position: fixed; inset: 0; z-index: 0; }
    #ui {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: clamp(1.2rem, 3.5vw, 2.5rem); pointer-events: none;
    }
    #top {
      display: flex; justify-content: space-between; align-items: flex-start;
      opacity: 0; animation: fadein 2s ease 0.3s forwards;
    }
    #title { font-size: clamp(2.2rem, 7vw, 5rem); font-weight: 400; letter-spacing: -0.04em; line-height: 1; }
    #status { text-align: right; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; line-height: 2.1; color: #888880; }
    #status .val { color: var(--accent); }
    #hist-badge {
      font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--bg); background: var(--accent); padding: 2px 6px;
      display: none; margin-top: 2px;
    }
    #hist-badge.on { display: inline-block; }

    /* TIMELINE */
    #timeline {
      pointer-events: all;
      opacity: 0; animation: fadein 2s ease 1s forwards;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    #mode-bar { display: flex; gap: 1.8rem; }
    .mode-btn {
      background: none; border: none; cursor: pointer; font-family: inherit;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #888880; padding: 0; transition: color 0.2s;
    }
    .mode-btn:hover { color: #bbbbB0; }
    .mode-btn.on { color: var(--accent); }
    .ctrl { display: none; }
    .ctrl.on { display: flex; flex-direction: column; gap: 0.5rem; }

    /* slider */
    #slider-row { display: flex; flex-direction: column; gap: 0.35rem; }
    #slider-labels {
      display: flex; justify-content: space-between;
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #888880;
    }
    #slider-cur { color: var(--accent); }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 1px; background: var(--muted); cursor: pointer; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    }
    input[type=range]::-moz-range-thumb {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent); border: none;
    }

    /* fecha */
    #fecha-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    input[type=date], input[type=time] {
      background: none; border: none; border-bottom: 1px solid var(--muted);
      color: var(--fg); font-family: inherit; font-size: 10px;
      letter-spacing: 0.08em; padding: 2px 4px; cursor: pointer; outline: none;
    }
    input[type=date]::-webkit-calendar-picker-indicator,
    input[type=time]::-webkit-calendar-picker-indicator { filter: invert(0.4); }
    #btn-ir {
      background: none; border: none; cursor: pointer; font-family: inherit;
      font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--accent); padding: 0; transition: color 0.2s;
    }
    #btn-ir:hover { color: var(--fg); }

    /* eventos */
    #eventos-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .ev {
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: #888880; cursor: pointer; transition: color 0.2s;
      display: grid; grid-template-columns: 8rem 1fr 3.5rem; gap: 0.8rem;
    }
    .ev:hover { color: var(--fg); }
    .ev.on { color: var(--accent); }

    /* BOTTOM */
    #bottom {
      display: flex; flex-direction: column; gap: 0.75rem;
      opacity: 0; animation: fadein 2s ease 1.2s forwards;
    }
    #sismo-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .sq {
      display: grid; grid-template-columns: 3.5rem 1fr 6rem;
      gap: 1rem; font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: #555550;
      line-height: 1.6; transition: color 0.5s;
    }
    .sq.act  { color: #888880; }
    .sq.loud { color: var(--accent); }
    .sq.new  { color: var(--fg); }
    .sq-mag  { font-weight: 700; }
    .sq-pl   { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sq-dep  { text-align: right; }
    #scope-wrap { width: 100%; height: 22px; }
    #scope { width: 100%; height: 100%; display: block; }

    /* mapa */
    #map-wrap {
      position: fixed; right: clamp(2rem, 6vw, 8rem); top: 50%; transform: translateY(-50%);
      z-index: 5; pointer-events: none; opacity: 0; animation: fadein 3s ease 1s forwards;
    }
    #chile-map { height: clamp(180px, 48vh, 400px); width: auto; opacity: 0.07; fill: var(--fg); }

    /* veil */
    #veil {
      position: fixed; inset: 0; z-index: 40;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; pointer-events: all;
    }
    #veil.gone { pointer-events: none; }
    #veil-txt {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: #444440; animation: breathe 3s ease-in-out infinite; transition: opacity 0.8s;
    }
    #veil.gone #veil-txt { opacity: 0; }

    @keyframes fadein { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    @keyframes breathe { 0%,100%{opacity:.25;} 50%{opacity:.7;} }
    @media(max-width:600px){ #map-wrap{display:none;} .ev{grid-template-columns:6rem 1fr 3rem;} }
  </style>
</head>
<body>

             C44,112 48,120 46,128 C44,136 38,140 36,148 C34,156 38,164 36,172
             C34,180 28,184 26,192 C24,200 28,210 26,220 C24,230 18,236 16,246
             C14,256 18,266 16,276 C14,286 8,292 8,302 C8,312 14,318 14,328

             C36,462 40,456 38,450 C36,444 30,440 30,434 C30,428 34,424 34,418
             C34,412 30,406 30,400 C30,394 34,388 34,382 C34,376 30,370 30,364
             C30,358 34,352 34,346 C34,340 30,334 30,328 C30,322 34,316 36,310
             C38,304 38,296 40,290 C42,284 46,280 48,274 C50,268 50,260 52,254
             C54,248 58,244 60,238 C62,232 62,224 64,218 C66,212 70,208 70,202
             C70,196 66,192 66,186 C66,180 70,174 70,168 C70,162 66,158 66,152

             C48,46 52,40 52,34 C52,28 48,22 50,16 C52,10 55,5 55,5 Z"/>
  </svg>
</div>

<div id="ui">
  <div id="top">
    <div id="title">chile</div>
    <div id="status">
      <div>sismos <span class="val" id="st-n">—</span></div>

<script>
// ── Reloj ─────────────────────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0');}
const MO=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function tick(){
  const s=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Santiago'}));
  document.getElementById('st-time').textContent=
    pad(s.getHours())+':'+pad(s.getMinutes())+':'+pad(s.getSeconds())+
    ' · '+pad(s.getDate())+' '+MO[s.getMonth()];
}
tick(); setInterval(tick,1000);

// ── Estado ────────────────────────────────────────────────────────────────────
let quakes=[], audioReady=false, historic=false, liveInt=null;
let actx, analyser, masterGain;

// ── USGS ──────────────────────────────────────────────────────────────────────
const BBOX='&minlatitude=-56&maxlatitude=-17&minlongitude=-76&maxlongitude=-66';
const BASE='https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&orderby=time'+BBOX;

function pq(eq){
  const p=eq.properties,c=eq.geometry.coordinates;
  let pl=(p.place||'').replace(/^\d+\s*km\s+[A-Z]+\s+of\s+/i,'')
    .replace(/,?\s*chile$/i,'').trim().toUpperCase();
  if(pl.length>24) pl=pl.slice(0,24)+'…';
  return{id:eq.id,mag:parseFloat(p.mag)||0,lat:c[1],lon:c[0],dep:c[2],ms:p.time,pl};
}

async function doFetch(extra){
  try{
    const u=BASE+'&'+new URLSearchParams(extra).toString();
    const d=await(await fetch(u)).json();
    return(d.features||[]).map(pq);
  }catch(e){return[];}
}

async function fetchLive(){
  const q=await doFetch({limit:15,minmagnitude:1.5});
  if(!q.length)return;
  const prev=new Set(quakes.map(x=>x.id));
  const fresh=q.filter(x=>!prev.has(x.id));
  quakes=q; renderUI(fresh);
  if(audioReady) fresh.forEach(x=>spawnOsc(x));
}

async function fetchHist(s,e,mm){
  const q=await doFetch({limit:50,minmagnitude:mm,starttime:s,endtime:e});
  quakes=q; killPool(); renderUI([]);
  if(audioReady) quakes.slice(0,12).forEach(x=>spawnOsc(x));
}

// ── Audio ─────────────────────────────────────────────────────────────────────
const MAX=12, pool=[];

function initAudio(){
  if(audioReady)return;
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC){ console.warn('Web Audio not supported'); return; }
  actx=new AC();
  analyser=actx.createAnalyser(); analyser.fftSize=512;
  masterGain=actx.createGain(); masterGain.gain.value=0.65;
  masterGain.connect(actx.destination); masterGain.connect(analyser);
  audioReady=true;
}

function rev(t,d){
  const l=Math.floor(actx.sampleRate*t),b=actx.createBuffer(2,l,actx.sampleRate);
  for(let c=0;c<2;c++){const a=b.getChannelData(c);for(let i=0;i<l;i++)a[i]=(Math.random()*2-1)*Math.pow(1-i/l,d);}
  const v=actx.createConvolver(); v.buffer=b; return v;
}

function l2f(lat){const t=(lat-(-17))/((-56)-(-17));return 880*Math.pow(55/880,t);}
function l2p(lon){return((lon-(-76))/((-66)-(-76)))*2-1;}
function d2w(dep){if(dep<25)return'sine';if(dep<70)return'triangle';if(dep<150)return'sawtooth';return'square';}
function m2g(mag){return Math.min(0.28,0.022*Math.pow(2,mag-1.5));}
function age(ms){const h=(Date.now()-ms)/3600000;return Math.max(0.15,1-h/48);}

function spawnOsc(q){
  if(!audioReady||pool.length>=MAX)return;
  const freq=l2f(q.lat),wave=d2w(q.dep);
  const gval=m2g(q.mag)*(historic?1:age(q.ms));
  const pan=l2p(q.lon),rt=Math.max(2,6-q.dep/60);
  const osc=actx.createOscillator(),filt=actx.createBiquadFilter();
  const gain=actx.createGain(),pn=actx.createStereoPanner?actx.createStereoPanner():null;
  const cv=rev(rt,2.2),dry=actx.createGain(),wet=actx.createGain();
  osc.type=wave; osc.frequency.value=freq; osc.detune.value=(q.dep%30)*1.2-18;
  filt.type='lowpass'; filt.frequency.value=400+q.mag*180; filt.Q.value=1.2;
  gain.gain.value=0; dry.gain.value=0.4; wet.gain.value=0.6;
  osc.connect(filt); filt.connect(gain);
  const pre=pn?(()=>{gain.connect(pn);pn.pan.value=pan;return pn;})():gain;
  pre.connect(dry); pre.connect(cv); dry.connect(masterGain); cv.connect(wet); wet.connect(masterGain);
  osc.start(); gain.gain.setTargetAtTime(gval,actx.currentTime,0.4);
  const fd=historic?90:Math.max(30,300-q.dep);
  gain.gain.setTargetAtTime(0,actx.currentTime+fd,12);
  const node={osc,gain,filt,cv,dry,wet,pn,id:q.id}; pool.push(node); updOsc(); addRing(q);
  setTimeout(()=>{
    const i=pool.indexOf(node);if(i>-1)pool.splice(i,1);
    try{osc.stop();[osc,filt,gain,cv,dry,wet,pn].forEach(n=>n&&n.disconnect());}catch(e){}
    updOsc();
  },(fd+60)*1000);
}

function killPool(){
  pool.forEach(n=>{
    try{n.gain.gain.cancelScheduledValues(actx.currentTime);
      n.gain.gain.setTargetAtTime(0,actx.currentTime,0.08);
      setTimeout(()=>{try{n.osc.stop();[n.osc,n.filt,n.gain,n.cv,n.dry,n.wet,n.pn].forEach(x=>x&&x.disconnect());}catch(e){}},400);
    }catch(e){}
  });
  pool.length=0; updOsc();
}

function updOsc(){document.getElementById('st-osc').textContent=pool.length;}

// ── Activación ────────────────────────────────────────────────────────────────
const veil=document.getElementById('veil');

function go(){
  // crear AudioContext sincrónicamente dentro del click handler
  initAudio();
  if(!audioReady)return;
  // resume() puede devolver un Promise en Chrome — esperamos que resuelva
  const p=actx.resume();
  const start=()=>{
    veil.classList.add('gone');
    if(quakes.length) quakes.slice(0,MAX).forEach(x=>spawnOsc(x));
    updOsc();
  };
  if(p && typeof p.then==='function') p.then(start); else start();
}

veil.addEventListener('click', go);
veil.addEventListener('touchend',e=>{e.preventDefault();go();},{passive:false});

// ── Modos ─────────────────────────────────────────────────────────────────────
function goLive(){
  historic=false; clearInterval(liveInt);
  document.querySelectorAll('.ev').forEach(e=>e.classList.remove('on'));
  document.getElementById('hist-badge').className='';
  fetchLive(); liveInt=setInterval(fetchLive,60000);
}
function goHist(s,e,mm){
  historic=true; clearInterval(liveInt);
  document.getElementById('hist-badge').className='on';
  fetchHist(s,e,mm);
}

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.ctrl').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById('ctrl-'+b.dataset.m).classList.add('on');
    if(b.dataset.m==='live') goLive();
  });
});

// ── Slider 24h ────────────────────────────────────────────────────────────────
const sl=document.getElementById('sl');
const slC=document.getElementById('slider-cur');
sl.addEventListener('input',()=>{
  const v=parseInt(sl.value);
  slC.textContent=v===0?'ahora':'hace '+pad(Math.floor(v/60))+'h'+pad(v%60)+'m';
});
sl.addEventListener('change',()=>{
  const v=parseInt(sl.value);
  if(v===0){goLive();return;}
  // ventana acumulativa: desde v minutos atrás hasta ahora
  const ahora=new Date();
  const inicio=new Date(Date.now()-v*60000);
  goHist(inicio.toISOString(),ahora.toISOString(),1.5);
});

// ── Fecha ─────────────────────────────────────────────────────────────────────
document.getElementById('btn-ir').addEventListener('click',()=>{
  const d=document.getElementById('inp-d').value;
  const t=document.getElementById('inp-t').value||'00:00';
  if(!d)return;
  // desde el momento elegido hasta 4 horas después, M1.5+
  const c=new Date(d+'T'+t+':00Z');
  const fin=new Date(c.getTime()+14400000); // +4h
  goHist(c.toISOString(),fin.toISOString(),1.5);
});

// ── Eventos ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.ev').forEach(ev=>{
  ev.addEventListener('click',()=>{
    document.querySelectorAll('.ev').forEach(e=>e.classList.remove('on'));
    ev.classList.add('on');
    goHist(ev.dataset.s,ev.dataset.e,parseFloat(ev.dataset.mm)||3.0);
  });
});

// ── Render UI ─────────────────────────────────────────────────────────────────
function fmtTime(ms){
  if(historic){
    const d=new Date(ms);
    return pad(d.getUTCDate())+' '+MO[d.getUTCMonth()]+' '+d.getUTCFullYear()+
      ' '+pad(d.getUTCHours())+':'+pad(d.getUTCMinutes())+'Z';
  }
  const df=Date.now()-ms,m=Math.floor(df/60000),h=Math.floor(m/60);
  if(h>23)return Math.floor(h/24)+'d '+pad(h%24)+'h';
  if(h>0)return pad(h)+'h '+pad(m%60)+'m';
  return pad(m)+'m';
}

function renderUI(fresh=[]){
  const fi=new Set((fresh||[]).map(x=>x.id));
  const list=document.getElementById('sismo-list'); list.innerHTML='';
  quakes.slice(0,10).forEach((q,i)=>{
    const el=document.createElement('div');
    let c='sq';
    if(fi.has(q.id))c+=' new';
    else if(q.mag>=4.5)c+=' loud';
    else if(i<MAX)c+=' act';
    el.className=c;
    el.innerHTML='<span class="sq-mag">M'+q.mag.toFixed(1)+'</span>'+
      '<span class="sq-pl">'+q.pl+'</span>'+
      '<span class="sq-dep">'+Math.round(q.dep)+'km '+fmtTime(q.ms)+'</span>';
    list.appendChild(el);
  });
  document.getElementById('st-n').textContent=quakes.length;
  if(quakes.length)
    document.getElementById('st-last').textContent=
      'M'+quakes[0].mag.toFixed(1)+(historic?' hist':' '+fmtTime(quakes[0].ms));
}
setInterval(()=>{if(quakes.length&&!historic)renderUI();},30000);

// ── Scope ─────────────────────────────────────────────────────────────────────
const sc=document.getElementById('scope'),sctx=sc.getContext('2d');
function rsz(){sc.width=sc.offsetWidth*devicePixelRatio;sc.height=sc.offsetHeight*devicePixelRatio;}
rsz(); window.addEventListener('resize',rsz);
function drawSc(){
  requestAnimationFrame(drawSc);
  const W=sc.width,H=sc.height; sctx.clearRect(0,0,W,H);
  if(!analyser||pool.length===0){
    sctx.beginPath();sctx.strokeStyle='#1a1a18';sctx.lineWidth=1;
    sctx.moveTo(0,H/2);sctx.lineTo(W,H/2);sctx.stroke();return;
  }
  const data=new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(data);
  sctx.beginPath();sctx.strokeStyle='#c8b89a';sctx.lineWidth=devicePixelRatio;sctx.lineJoin='round';
  const sw=W/data.length;
  data.forEach((v,i)=>{const x=i*sw,y=(0.5+v*0.44)*H;i===0?sctx.moveTo(x,y):sctx.lineTo(x,y);});
  sctx.stroke();
}
drawSc();

// ── Fondo ─────────────────────────────────────────────────────────────────────
const bg=document.getElementById('canvas-bg'),bctx=bg.getContext('2d');
let bW,bH; const rings=[];
function rbg(){bW=bg.width=window.innerWidth;bH=bg.height=window.innerHeight;}
rbg(); window.addEventListener('resize',rbg);
function qxy(q){
  return{x:bW*(0.10+((q.lon-(-76))/((-66)-(-76)))*0.38),
         y:bH*(0.05+((q.lat-(-17))/((-56)-(-17)))*0.90)};
}
function addRing(q){const{x,y}=qxy(q);rings.push({x,y,r:0,maxR:40+q.mag*28,t:0});}
function drawBg(){
  requestAnimationFrame(drawBg);
  bctx.clearRect(0,0,bW,bH); bctx.fillStyle='#0a0a0a'; bctx.fillRect(0,0,bW,bH);
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i]; r.t+=0.006; r.r=r.maxR*Math.pow(r.t,0.6);
    const a=Math.max(0,0.18*(1-r.t)),lw=Math.max(0.3,1.2*(1-r.t));
    bctx.beginPath(); bctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    bctx.strokeStyle='rgba(200,184,154,'+a+')'; bctx.lineWidth=lw; bctx.stroke();
    if(r.t>=1)rings.splice(i,1);
  }
}
drawBg();

// ── Inicio ────────────────────────────────────────────────────────────────────
fetchLive(); liveInt=setInterval(fetchLive,60000);
setInterval(()=>{if(quakes.length&&!historic)quakes.slice(0,6).forEach(q=>addRing(q));},12000);
</script>
