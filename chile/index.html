<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>chile</title>
  <style>
    :root {
      --bg: #0a0a0a; --fg: #e8e8e0;
      --accent: #c8b89a; --red: #c04030;
      --muted: #888880; --dim: #444440; --line: #1e1e1c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: var(--bg); color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }
    /* reset total de botones */
    button {
      -webkit-appearance: none; appearance: none;
      background: none; border: none; cursor: pointer;
      font-family: inherit; color: inherit; padding: 0;
    }
    button:disabled { cursor: default; }

    #canvas-bg { position: fixed; inset: 0; z-index: 0; }

    /* ── LAYOUT ── */
    #ui {
      position: fixed; inset: 0; z-index: 10;
      display: grid;
      grid-template-rows: auto 200px 1fr;
      padding: clamp(1rem, 3vw, 2rem);
      gap: 0.8rem;
      pointer-events: none;
    }

    /* TOP */
    #top {
      display: flex; justify-content: space-between; align-items: flex-start;
      opacity: 0; animation: fadein 1s ease 0.2s forwards;
    }
    #title { font-size: clamp(1.8rem, 5vw, 3.5rem); font-weight: 400; letter-spacing: -0.04em; line-height: 1; }
    #status { text-align: right; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; line-height: 2.1; color: var(--muted); }
    #status .val { color: var(--accent); }
    #hist-badge { font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--bg); background: var(--accent); padding: 2px 6px; visibility: hidden; display: inline-block; }
    #hist-badge.on { visibility: visible; }

    /* MAP */
    #map-center {
      display: flex; align-items: center; min-height: 0;
      opacity: 0; animation: fadein 1.5s ease 0.4s forwards;
    }
    #map-svg { width: 100%; height: 100%; max-height: 200px; display: block; }
    .qdot-ring { transform-box: fill-box; transform-origin: center; animation: ring-pulse 2.8s ease-out infinite; }
    .qdot-ring.red { animation-duration: 1.8s; }
    @keyframes ring-pulse { 0%{opacity:.65;transform:scale(1);}100%{opacity:0;transform:scale(4.5);} }

    /* BOTTOM */
    #bottom {
      position: relative;
      display: flex; flex-direction: column; gap: 0.5rem;
      min-height: 0; overflow: hidden;
      opacity: 0; animation: fadein 1.5s ease 0.6s forwards;
      pointer-events: all;
    }

    /* ── PANTALLA DE ACTIVACIÓN (inline, no veil) ── */
    #activate-screen {
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: flex-start;
      gap: 1.2rem; padding-top: 0.5rem;
    }
    #activate-screen.hidden { display: none; }

    #activate-desc {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); line-height: 2;
    }

    #btn-activate {
      display: inline-flex; align-items: center; gap: 0.8rem;
      border: 1px solid var(--accent); color: var(--accent);
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 0.65rem 1.4rem;
      transition: background 0.2s, color 0.2s;
      pointer-events: all; cursor: pointer;
    }
    #btn-activate:hover { background: var(--accent); color: var(--bg); }
    #btn-activate:active { background: var(--accent); color: var(--bg); opacity: 0.8; }
    #btn-activate .play-icon { font-size: 13px; }

    /* ── CONTENIDO ACTIVO ── */
    #active-screen {
      display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-height: 0;
    }
    #active-screen.hidden { display: none; }

    /* mode bar */
    #mode-bar { display: flex; gap: 2rem; align-items: baseline; }
    .mode-btn {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--dim); transition: color 0.2s; pointer-events: all;
    }
    .mode-btn.on { color: var(--accent); }
    .mode-btn:hover:not(.on) { color: var(--muted); }
    #mode-context { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-left: auto; }

    #ctrl-wrap { position: relative; min-height: 52px; }
    .ctrl { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; gap: 0.28rem; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .ctrl.on { opacity: 1; pointer-events: all; }

    /* eventos */
    .ev {
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; transition: color 0.2s;
      display: grid; grid-template-columns: 7.5rem 1fr 3.5rem; gap: 0.8rem;
      padding: 0.3rem 0; border-bottom: 1px solid var(--line);
      pointer-events: all;
    }
    .ev:first-child { border-top: 1px solid var(--line); }
    .ev:hover { color: var(--fg); }
    .ev.on { color: var(--accent); }
    .mag-r { color: var(--red); }
    #ev-hint { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); margin-top: 0.5rem; }
    #ev-hint.hidden { display: none; }

    /* listas */
    #sismo-list { display: flex; flex-direction: column; gap: 0.25rem; overflow: hidden; }
    .sq {
      display: grid; grid-template-columns: 3.5rem 1fr 5.5rem;
      gap: 0.8rem; font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dim);
      line-height: 1.6; opacity: 0;
    }
    .sq.act  { color: var(--muted); }
    .sq.big  { color: var(--accent); }
    .sq.huge { color: var(--red); }
    .sq-mag { font-weight: 700; }
    .sq-pl  { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sq-dep { text-align: right; }
    .sq-loading { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); opacity: 0; animation: fadein 0.5s ease 0.5s forwards, breathe 2s ease-in-out 0.5s infinite; }
    @keyframes item-in { from{opacity:0;transform:translateX(-5px);}to{opacity:1;transform:none;} }

    /* event panel */
    #event-panel {
      position: absolute; top: 0; right: 0;
      width: 54%; height: 100%;
      display: flex; flex-direction: column; gap: 0.4rem;
      background: linear-gradient(to left, #0a0a0a 58%, transparent);
      padding-left: 2.5rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #event-panel.on { opacity: 1; pointer-events: all; }
    #event-header-row { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 0.3rem; border-bottom: 1px solid var(--line); }
    #event-title { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
    #ev-close { font-size: 14px; color: var(--dim); transition: color 0.2s; pointer-events: all; }
    #ev-close:hover { color: var(--fg); }
    #event-list { display: flex; flex-direction: column; gap: 0.25rem; overflow-y: auto; }
    #event-list .sq { font-size: 11px; letter-spacing: 0.06em; grid-template-columns: 4rem 1fr 6rem; }
    #event-status { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); margin-top: 0.3rem; }

    #scope-wrap { height: 18px; flex-shrink: 0; margin-top: auto; }
    #scope { width: 100%; height: 100%; display: block; }

    @keyframes fadein  { from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;} }
    @keyframes breathe { 0%,100%{opacity:.3;}50%{opacity:.8;} }

    @media(max-width:600px){
      #ui { grid-template-rows: auto 130px 1fr; }
      .ev { grid-template-columns: 6rem 1fr 3rem; }
      #event-panel { width:100%; height:45%; top:auto; bottom:0; padding:1.5rem 0 0 0; background:linear-gradient(to top,#0a0a0a 70%,transparent); }
    }
  </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div id="ui">

    <div id="status">

          <line x1="42" y1="0" x2="42" y2="110"/><line x1="131" y1="0" x2="131" y2="110"/>
          <line x1="207" y1="0" x2="207" y2="110"/><line x1="295" y1="0" x2="295" y2="110"/>
          <line x1="397" y1="0" x2="397" y2="110"/>
        </g>
        <g transform="translate(0,100) rotate(-90)" fill="#e8e8e0" fill-opacity="0.11">
          <path d="M55,5 C60,5 68,8 72,14 C76,20 74,28 70,34 C66,40 60,44 58,50
                   C56,56 62,60 64,66 C66,72 62,80 58,86 C54,92 48,96 46,104
                   C44,112 48,120 46,128 C44,136 38,140 36,148 C34,156 38,164 36,172
                   C34,180 28,184 26,192 C24,200 28,210 26,220 C24,230 18,236 16,246
                   C14,256 18,266 16,276 C14,286 8,292 8,302 C8,312 14,318 14,328
                   C14,338 8,344 8,354 C8,364 14,372 16,382 C18,392 16,402 18,412
                   C20,422 26,428 28,438 C30,448 26,458 28,466 C30,474 36,478 38,486
                   C40,494 38,500 40,500 C42,496 44,490 42,484 C40,478 36,474 36,468
                   C36,462 40,456 38,450 C36,444 30,440 30,434 C30,428 34,424 34,418
                   C34,412 30,406 30,400 C30,394 34,388 34,382 C34,376 30,370 30,364
                   C30,358 34,352 34,346 C34,340 30,334 30,328 C30,322 34,316 36,310
                   C38,304 38,296 40,290 C42,284 46,280 48,274 C50,268 50,260 52,254
                   C54,248 58,244 60,238 C62,232 62,224 64,218 C66,212 70,208 70,202
                   C70,196 66,192 66,186 C66,180 70,174 70,168 C70,162 66,158 66,152
                   C66,146 70,140 70,134 C70,128 66,124 66,118 C66,112 70,106 68,100
                   C66,94 60,92 58,86 C56,80 58,72 56,66 C54,60 48,58 48,52
                   C48,46 52,40 52,34 C52,28 48,22 50,16 C52,10 55,5 55,5 Z"/>
        </g>
        <g id="quake-dots"></g>
      </g>
      <rect x="0.5" y="0.5" width="509" height="109" rx="17.5" ry="17.5" fill="none" stroke="rgba(200,184,154,0.13)" stroke-width="1"/>
      <text x="8"   y="106" font-family="'Courier New',monospace" font-size="7" fill="#252522">N</text>
      <text x="502" y="106" font-family="'Courier New',monospace" font-size="7" fill="#252522" text-anchor="end">S</text>
    </svg>
  </div>

  <div id="bottom">

    <!-- PANTALLA ANTES DE ACTIVAR -->
    <div id="activate-screen">
      <div id="activate-desc">
        instrumento sísmico en tiempo real<br>
        cada frecuencia representa un movimiento sísmico

<script>
// ── Reloj ─────────────────────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0');}
const MO=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function tick(){
  const s=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Santiago'}));
  document.getElementById('st-time').textContent=
    pad(s.getHours())+':'+pad(s.getMinutes())+':'+pad(s.getSeconds())+' · '+pad(s.getDate())+' '+MO[s.getMonth()];
}
tick(); setInterval(tick,1000);

// ── Estado ────────────────────────────────────────────────────────────────────
const S={audio:false,mode:'init',loading:false,liveInt:null};
let quakes=[], evQuakes=[];
let actx, analyser, masterGain;

// ── USGS ──────────────────────────────────────────────────────────────────────
const BBOX='&minlatitude=-56&maxlatitude=-17&minlongitude=-76&maxlongitude=-66';
const BASE='https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&orderby=time'+BBOX;
function pq(eq){
  const p=eq.properties,c=eq.geometry.coordinates;
  let pl=(p.place||'').replace(/^\d+\s*km\s+[A-Z]+\s+of\s+/i,'').replace(/,?\s*chile$/i,'').trim().toUpperCase();
  if(pl.length>24)pl=pl.slice(0,24)+'…';
  return{id:eq.id,mag:parseFloat(p.mag)||0,lat:c[1],lon:c[0],dep:c[2],ms:p.time,pl};
}
async function doFetch(params){
  try{
    const u=BASE+'&'+new URLSearchParams(params).toString();
    const d=await(await fetch(u)).json();
    return(d.features||[]).map(pq);
  }catch(e){return[];}
}

// ── Audio ─────────────────────────────────────────────────────────────────────
const MAX=12,pool=[];
function initAudio(){
  if(S.audio)return;
  const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
  actx=new AC(); analyser=actx.createAnalyser(); analyser.fftSize=512;
  masterGain=actx.createGain(); masterGain.gain.value=0.65;
  masterGain.connect(actx.destination); masterGain.connect(analyser);
  S.audio=true;
}
function mkRev(t,d){
  const l=Math.floor(actx.sampleRate*t),b=actx.createBuffer(2,l,actx.sampleRate);
  for(let ch=0;ch<2;ch++){const a=b.getChannelData(ch);for(let i=0;i<l;i++)a[i]=(Math.random()*2-1)*Math.pow(1-i/l,d);}
  const v=actx.createConvolver();v.buffer=b;return v;
}
function l2f(lat){const t=(lat-(-17))/((-56)-(-17));return 880*Math.pow(55/880,t);}
function l2p(lon){return((lon-(-76))/((-66)-(-76)))*2-1;}
function d2w(d){if(d<25)return'sine';if(d<70)return'triangle';if(d<150)return'sawtooth';return'square';}
function m2g(m){return Math.min(0.28,0.022*Math.pow(2,m-1.5));}
function ageM(ms){const h=(Date.now()-ms)/3600000;return Math.max(0.2,1-h/14);}

function spawnOsc(q){
  if(!S.audio||pool.length>=MAX)return;
  const freq=l2f(q.lat),wave=d2w(q.dep),pan=l2p(q.lon),rt=Math.max(2,6-q.dep/60);
  const gval=m2g(q.mag)*ageM(q.ms);
  const osc=actx.createOscillator(),filt=actx.createBiquadFilter(),gain=actx.createGain();
  const pn=actx.createStereoPanner?actx.createStereoPanner():null;
  const cv=mkRev(rt,2.2),dry=actx.createGain(),wet=actx.createGain();
  osc.type=wave; osc.frequency.value=freq; osc.detune.value=(q.dep%30)*1.2-18;
  filt.type='lowpass'; filt.frequency.value=400+q.mag*180; filt.Q.value=1.2;
  gain.gain.value=0; dry.gain.value=0.4; wet.gain.value=0.6;
  osc.connect(filt); filt.connect(gain);
  const pre=pn?(()=>{gain.connect(pn);pn.pan.value=pan;return pn;})():gain;
  pre.connect(dry); pre.connect(cv); dry.connect(masterGain); cv.connect(wet); wet.connect(masterGain);
  osc.start(); gain.gain.setTargetAtTime(gval,actx.currentTime,0.4);
  const fd=Math.max(30,300-q.dep);
  gain.gain.setTargetAtTime(0,actx.currentTime+fd,12);
  const node={osc,gain,filt,cv,dry,wet,pn,id:q.id}; pool.push(node); updOsc(); addRing(q);
  setTimeout(()=>{
    const i=pool.indexOf(node); if(i>-1)pool.splice(i,1);
    try{osc.stop();[osc,filt,gain,cv,dry,wet,pn].forEach(n=>n&&n.disconnect());}catch(e){}
    updOsc();
  },(fd+60)*1000);
}
function killPool(){
  pool.forEach(n=>{
    try{n.gain.gain.cancelScheduledValues(actx.currentTime); n.gain.gain.setTargetAtTime(0,actx.currentTime,0.1);
      setTimeout(()=>{try{n.osc.stop();[n.osc,n.filt,n.gain,n.cv,n.dry,n.wet,n.pn].forEach(x=>x&&x.disconnect());}catch(e){}},500);
    }catch(e){}
  });
  pool.length=0; updOsc();
}
function updOsc(){document.getElementById('st-osc').textContent=pool.length; updateMapDots();}

// ── Mapa ──────────────────────────────────────────────────────────────────────
function q2xy(lat,lon){return{x:5+((lat-(-17))/((-56)-(-17)))*495,y:92-((lon-(-76))/((-66)-(-76)))*68};}
const NS='http://www.w3.org/2000/svg';
function mkEl(tag,attrs){const el=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;}
function updateMapDots(){
  const g=document.getElementById('quake-dots'); g.innerHTML='';
  const aid=new Set(pool.map(n=>n.id));
  [...quakes.map(q=>({...q,_ev:false})),...evQuakes.map(q=>({...q,_ev:true}))].forEach(q=>{
    const{x,y}=q2xy(q.lat,q.lon),big=q.mag>=6,r=Math.max(1.5,q.mag*1.3);
    const active=aid.has(q.id)||q._ev, col=big?'#c04030':(active?'#c8b89a':'#383836');
    if(active){
      g.appendChild(mkEl('circle',{cx:x,cy:y,r:r*2,fill:'none',stroke:big?'rgba(192,64,48,0.5)':'rgba(200,184,154,0.4)','stroke-width':'0.8',class:'qdot-ring'+(big?' red':'')}));
      g.appendChild(mkEl('circle',{cx:x,cy:y,r:r+2,fill:big?'rgba(192,64,48,0.12)':'rgba(200,184,154,0.1)',filter:big?'url(#glow-red)':'url(#glow)'}));
    }
    g.appendChild(mkEl('circle',{cx:x,cy:y,r:r,fill:col,opacity:active?'1':'0.35'}));
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function magCls(mag,i){if(mag>=6)return' huge';if(mag>=4.5)return' big';if(i<MAX)return' act';return'';}
function fmtT(ms){const df=Date.now()-ms,m=Math.floor(df/60000),h=Math.floor(m/60);if(h>23)return Math.floor(h/24)+'d '+pad(h%24)+'h';if(h>0)return pad(h)+'h '+pad(m%60)+'m';return pad(m)+'m';}
function fmtTutc(ms){const d=new Date(ms);return pad(d.getUTCDate())+' '+MO[d.getUTCMonth()]+' '+pad(d.getUTCHours())+':'+pad(d.getUTCMinutes())+'Z';}
function renderList(el,items,timeFn){
  el.innerHTML='';
  if(!items.length){const d=document.createElement('div');d.className='sq-loading';d.textContent='sin datos para este período';el.appendChild(d);return;}
  items.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='sq'+magCls(q.mag,i);
    div.style.animation=`item-in 0.2s ease ${i*0.055}s forwards`;
    div.innerHTML='<span class="sq-mag">M'+q.mag.toFixed(1)+'</span><span class="sq-pl">'+q.pl+'</span><span class="sq-dep">'+Math.round(q.dep)+'km '+timeFn(q.ms)+'</span>';
    el.appendChild(div);
  });
}

// ── ACTIVACIÓN ────────────────────────────────────────────────────────────────
function activate(){
  initAudio(); if(!S.audio)return;
  const resume=actx.resume();
  const go=()=>{
    document.getElementById('activate-screen').classList.add('hidden');
    document.getElementById('active-screen').classList.remove('hidden');
    gotoLive();
  };
  if(resume&&typeof resume.then==='function')resume.then(go);else go();
}

document.getElementById('btn-activate').addEventListener('click',activate);
document.getElementById('btn-activate').addEventListener('touchend',e=>{e.preventDefault();activate();},{passive:false});

// ── ESTADO: LIVE ──────────────────────────────────────────────────────────────
function gotoLive(){
  S.mode='live'; clearInterval(S.liveInt); killPool(); evQuakes=[];
  setBtnActive('live'); switchCtrl('live');
  closeEventPanel();
  document.getElementById('hist-badge').className='';
  document.getElementById('mode-context').textContent='últimas 12h';
  const sl=document.getElementById('sismo-list');
  sl.innerHTML='<div class="sq-loading">cargando…</div>';
  fetchLiveData(); S.liveInt=setInterval(fetchLiveData,60000);
}
async function fetchLiveData(){
  if(S.mode!=='live')return;
  const q=await doFetch({limit:50,minmagnitude:1.5,starttime:new Date(Date.now()-12*3600000).toISOString()});
  if(S.mode!=='live')return;
  const prev=new Set(quakes.map(x=>x.id));
  const fresh=q.filter(x=>!prev.has(x.id));
  quakes=q;
  renderList(document.getElementById('sismo-list'),quakes.slice(0,8),fmtT);
  document.getElementById('st-n').textContent=quakes.length||'—';
  if(quakes.length)document.getElementById('st-last').textContent='M'+quakes[0].mag.toFixed(1)+' '+fmtT(quakes[0].ms);
  fresh.forEach(x=>spawnOsc(x)); updateMapDots();
}

// ── ESTADO: EVENTOS ───────────────────────────────────────────────────────────
function gotoEventos(){
  S.mode='eventos'; clearInterval(S.liveInt); killPool();
  setBtnActive('eventos'); switchCtrl('eventos');
  closeEventPanel();
  document.getElementById('hist-badge').className='';
  document.getElementById('mode-context').textContent='sismos históricos';
  document.getElementById('ev-hint').classList.remove('hidden');
  updateMapDots();
}
async function selectEvent(ev){
  if(S.mode!=='eventos'||S.loading)return;
  S.loading=true;
  document.querySelectorAll('.ev').forEach(e=>e.classList.remove('on')); ev.classList.add('on');
  document.getElementById('ev-hint').classList.add('hidden');
  document.getElementById('event-title').textContent=ev.dataset.label||'';
  document.getElementById('hist-badge').className='on';
  document.getElementById('event-status').textContent='cargando…';
  document.getElementById('event-list').innerHTML='';
  document.getElementById('event-panel').classList.add('on');
  killPool(); evQuakes=[]; updateMapDots();
  const q=await doFetch({limit:50,minmagnitude:parseFloat(ev.dataset.mm)||3.0,starttime:ev.dataset.s,endtime:ev.dataset.e});
  document.getElementById('event-status').textContent='';
  S.loading=false;
  if(S.mode!=='eventos')return;
  evQuakes=q;
  if(!q.length){document.getElementById('event-status').textContent='sin datos para este período';}
  else{renderList(document.getElementById('event-list'),evQuakes.slice(0,12),fmtTutc); evQuakes.slice(0,MAX).forEach(x=>spawnOsc(x));}
  updateMapDots();
}
function closeEventPanel(){
  document.getElementById('event-panel').classList.remove('on');
  document.getElementById('event-title').textContent='';
  document.getElementById('event-status').textContent='';
  document.getElementById('event-list').innerHTML='';
  document.querySelectorAll('.ev').forEach(e=>e.classList.remove('on'));
  document.getElementById('ev-hint').classList.remove('hidden');
  evQuakes=[]; updateMapDots();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
let currentCtrl='live';
function switchCtrl(to){
  if(currentCtrl===to)return;
  const fr=document.getElementById('ctrl-'+currentCtrl), to_=document.getElementById('ctrl-'+to);
  fr.classList.remove('on');
  setTimeout(()=>{to_.style.opacity='0';to_.classList.add('on');requestAnimationFrame(()=>requestAnimationFrame(()=>to_.style.opacity=''));},280);
  currentCtrl=to;
}
function setBtnActive(m){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('btn-'+m).classList.add('on');
}

document.getElementById('btn-live').addEventListener('click',()=>{if(S.audio&&S.mode!=='live')gotoLive();});
document.getElementById('btn-eventos').addEventListener('click',()=>{if(S.audio&&S.mode!=='eventos')gotoEventos();});
document.querySelectorAll('.ev').forEach(ev=>ev.addEventListener('click',()=>selectEvent(ev)));
document.getElementById('ev-close').addEventListener('click',()=>{if(!S.loading){killPool();closeEventPanel();document.getElementById('hist-badge').className='';}});

// ── Scope ─────────────────────────────────────────────────────────────────────
const sc=document.getElementById('scope'),sctx=sc.getContext('2d');
function rsz(){sc.width=sc.offsetWidth*devicePixelRatio;sc.height=sc.offsetHeight*devicePixelRatio;}
rsz(); window.addEventListener('resize',rsz);
function drawSc(){
  requestAnimationFrame(drawSc);
  const W=sc.width,H=sc.height; sctx.clearRect(0,0,W,H);
  if(!analyser||pool.length===0){sctx.beginPath();sctx.strokeStyle='#1a1a18';sctx.lineWidth=1;sctx.moveTo(0,H/2);sctx.lineTo(W,H/2);sctx.stroke();return;}
  const data=new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(data);
  sctx.beginPath();sctx.strokeStyle='#c8b89a';sctx.lineWidth=devicePixelRatio;sctx.lineJoin='round';
  const sw=W/data.length;
  data.forEach((v,i)=>{const x=i*sw,y=(0.5+v*0.44)*H;i===0?sctx.moveTo(x,y):sctx.lineTo(x,y);});
  sctx.stroke();
}
drawSc();

// ── Fondo ─────────────────────────────────────────────────────────────────────
const bg=document.getElementById('canvas-bg'),bctx=bg.getContext('2d');
let bW,bH; const rings=[];
function rbg(){bW=bg.width=window.innerWidth;bH=bg.height=window.innerHeight;}
rbg(); window.addEventListener('resize',rbg);
function addRing(q){
  const rect=document.getElementById('map-center').getBoundingClientRect();
  if(!rect.width)return;
  const{x,y}=q2xy(q.lat,q.lon);
  rings.push({x:rect.left+x/510*rect.width,y:rect.top+y/110*rect.height,r:0,maxR:50+q.mag*25,t:0,big:q.mag>=6});
}
function drawBg(){
  requestAnimationFrame(drawBg);
  bctx.clearRect(0,0,bW,bH); bctx.fillStyle='#0a0a0a'; bctx.fillRect(0,0,bW,bH);
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i]; r.t+=0.005; r.r=r.maxR*Math.pow(r.t,0.6);
    const a=Math.max(0,0.12*(1-r.t));
    bctx.beginPath(); bctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    bctx.strokeStyle=r.big?`rgba(192,64,48,${a})`:`rgba(200,184,154,${a})`;
    bctx.lineWidth=Math.max(0.3,1*(1-r.t)); bctx.stroke();
    if(r.t>=1)rings.splice(i,1);
  }
}
drawBg();
setInterval(()=>{if(S.mode==='live'&&quakes.length)quakes.slice(0,5).forEach(q=>addRing(q));},15000);
</script>
