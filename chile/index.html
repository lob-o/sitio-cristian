<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>chile</title>
  <style>
    :root {
      --bg: #0a0a0a; --fg: #e8e8e0;
      --accent: #c8b89a; --red: #c04030;
      --muted: #888880; --dim: #444440; --line: #1e1e1c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: var(--bg); color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }
    #canvas-bg { position: fixed; inset: 0; z-index: 0; }

    #ui {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      padding: clamp(1rem, 3vw, 2rem); gap: 0.8rem;
      pointer-events: none;
    }

    /* TOP */
    #top {
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-shrink: 0; opacity: 0; animation: fadein 1.5s ease 0.3s forwards;
    }
    #title { font-size: clamp(1.8rem, 5vw, 3.5rem); font-weight: 400; letter-spacing: -0.04em; line-height: 1; }
    #status { text-align: right; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; line-height: 2; color: var(--muted); }
    #status .val { color: var(--accent); }
    #status .val.red { color: var(--red); }
    #hist-badge { font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--bg); background: var(--accent); padding: 2px 6px; display: none; }
    #hist-badge.on { display: inline-block; }

    /* MAPA */
    #map-center {
      flex: 1; min-height: 0; display: flex; align-items: center;
      opacity: 0; animation: fadein 2s ease 0.6s forwards;
    }
    #map-svg { width: 100%; height: 100%; max-height: 240px; display: block; }
    .qdot-ring {
      transform-box: fill-box; transform-origin: center;
      animation: ring-pulse 2.8s ease-out infinite;
    }
    .qdot-ring.red { animation-duration: 2s; }
    @keyframes ring-pulse {
      0%   { opacity: 0.7; transform: scale(1); }
      100% { opacity: 0;   transform: scale(4); }
    }

    /* BOTTOM */
    #bottom {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 0.6rem 2rem;
      opacity: 0; animation: fadein 2s ease 1s forwards;
    }
    #bottom-left { grid-column: 1; grid-row: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    #event-panel {
      grid-column: 2; grid-row: 1;
      display: flex; flex-direction: column; gap: 0.35rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #event-panel.on { opacity: 1; pointer-events: all; }
    #scope-wrap { grid-column: 1 / -1; grid-row: 2; height: 20px; }
    #scope { width: 100%; height: 100%; display: block; }

    /* TIMELINE */
    #timeline { pointer-events: all; }
    #mode-bar { display: flex; gap: 2rem; margin-bottom: 0.5rem; }
    .mode-btn {
      background: none; border: none; cursor: pointer; font-family: inherit;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); padding: 0; transition: color 0.2s;
    }
    .mode-btn:hover { color: var(--fg); }
    .mode-btn.on { color: var(--accent); }

    /* ctrl con fade */
    #ctrl-wrap { position: relative; min-height: 56px; }
    .ctrl {
      position: absolute; top: 0; left: 0; width: 100%;
      display: flex; flex-direction: column; gap: 0.3rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .ctrl.on { opacity: 1; pointer-events: all; }

    /* eventos */
    .ev {
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; transition: color 0.25s;
      display: grid; grid-template-columns: 7.5rem 1fr 3.5rem; gap: 0.8rem;
      pointer-events: all;
    }
    .ev:hover { color: var(--fg); }
    .ev.on { color: var(--accent); }
    .ev .mag-r { color: var(--red); }

    /* listas */
    #sismo-list, #event-list { display: flex; flex-direction: column; gap: 0.25rem; }
    .sq {
      display: grid; grid-template-columns: 3.5rem 1fr 5.5rem;
      gap: 0.8rem; font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dim);
      line-height: 1.6; transition: color 0.4s;
    }
    .sq.act  { color: var(--muted); }
    .sq.big  { color: var(--accent); }
    .sq.huge { color: var(--red); }
    .sq.new  { color: var(--fg); }
    .sq-mag { font-weight: 700; }
    .sq-pl  { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sq-dep { text-align: right; }
    #event-header {
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.2rem; line-height: 1.8;
    }

    /* veil */
    #veil { position: fixed; inset: 0; z-index: 40; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: all; }
    #veil.gone { pointer-events: none; }
    #veil-txt { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #3a3a38; animation: breathe 3s ease-in-out infinite; transition: opacity 0.8s; }
    #veil.gone #veil-txt { opacity: 0; }

    @keyframes fadein { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    @keyframes breathe { 0%,100%{opacity:.2;} 50%{opacity:.6;} }

    @media(max-width:600px){
      #bottom { grid-template-columns: 1fr; }
      #event-panel { grid-column: 1; grid-row: 2; }
      #scope-wrap { grid-row: 3; }
      #map-svg { max-height: 140px; }
      .ev { grid-template-columns: 6rem 1fr 3rem; }
    }
  </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div id="ui">
  <div id="top">
    <div id="title">chile</div>
    <div id="status">
      <div>sismos <span class="val" id="st-n">—</span></div>
      <div>último <span class="val" id="st-last">—</span></div>
      <div>osciladores <span class="val" id="st-osc">0</span></div>
      <div><span class="val" id="st-time">—</span></div>

  <div id="map-center">
    <svg id="map-svg" viewBox="0 0 510 110" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

          <feGaussianBlur stdDeviation="3.5" result="blur"/>

        </filter>
      </defs>
      <g clip-path="url(#map-clip)">
        <rect x="0" y="0" width="510" height="110" fill="#0d0d0b"/>
        <!-- líneas de latitud sutiles -->
        <g stroke="#1a1a18" stroke-width="0.4" opacity="0.8">
          <line x1="42"  y1="0" x2="42"  y2="110"/>
          <line x1="131" y1="0" x2="131" y2="110"/>
          <line x1="207" y1="0" x2="207" y2="110"/>
          <line x1="295" y1="0" x2="295" y2="110"/>
          <line x1="397" y1="0" x2="397" y2="110"/>
        </g>
        <!-- Chile outline horizontal — rotate(-90) translate(0,100) -->
        <g transform="translate(0,100) rotate(-90)" fill="#e8e8e0" fill-opacity="0.11" stroke="none">
          <path d="M55,5 C60,5 68,8 72,14 C76,20 74,28 70,34 C66,40 60,44 58,50
                   C56,56 62,60 64,66 C66,72 62,80 58,86 C54,92 48,96 46,104
                   C44,112 48,120 46,128 C44,136 38,140 36,148 C34,156 38,164 36,172
                   C34,180 28,184 26,192 C24,200 28,210 26,220 C24,230 18,236 16,246
                   C14,256 18,266 16,276 C14,286 8,292 8,302 C8,312 14,318 14,328
                   C14,338 8,344 8,354 C8,364 14,372 16,382 C18,392 16,402 18,412
                   C20,422 26,428 28,438 C30,448 26,458 28,466 C30,474 36,478 38,486
                   C40,494 38,500 40,500 C42,496 44,490 42,484 C40,478 36,474 36,468
                   C36,462 40,456 38,450 C36,444 30,440 30,434 C30,428 34,424 34,418
                   C34,412 30,406 30,400 C30,394 34,388 34,382 C34,376 30,370 30,364
                   C30,358 34,352 34,346 C34,340 30,334 30,328 C30,322 34,316 36,310
                   C38,304 38,296 40,290 C42,284 46,280 48,274 C50,268 50,260 52,254
                   C54,248 58,244 60,238 C62,232 62,224 64,218 C66,212 70,208 70,202
                   C70,196 66,192 66,186 C66,180 70,174 70,168 C70,162 66,158 66,152
                   C66,146 70,140 70,134 C70,128 66,124 66,118 C66,112 70,106 68,100
                   C66,94 60,92 58,86 C56,80 58,72 56,66 C54,60 48,58 48,52
                   C48,46 52,40 52,34 C52,28 48,22 50,16 C52,10 55,5 55,5 Z"/>
        </g>
        <g id="quake-dots"></g>
      </g>
      <rect x="0.5" y="0.5" width="509" height="109" rx="17.5" ry="17.5" fill="none" stroke="rgba(200,184,154,0.15)" stroke-width="1"/>
      <text x="8"   y="106" font-family="'Courier New',monospace" font-size="7" letter-spacing="0.1em" fill="#2a2a28">N</text>
      <text x="502" y="106" font-family="'Courier New',monospace" font-size="7" letter-spacing="0.1em" fill="#2a2a28" text-anchor="end">S</text>
    </svg>
  </div>

  <div id="bottom">
    <div id="bottom-left">
      <div id="timeline">
        <div id="mode-bar">
          <button class="mode-btn on" data-m="live">vivo</button>
          <button class="mode-btn"    data-m="eventos">eventos</button>
        </div>
        <div id="ctrl-wrap">
          <div class="ctrl on" id="ctrl-live"></div>
          <div class="ctrl"    id="ctrl-eventos">
            <div class="ev" data-s="1960-05-22T19:00:00" data-e="1960-05-22T23:00:00" data-mm="5.0" data-label="22 may 1960 · valdivia · M9.5">
              <span>22 may 1960</span><span>valdivia</span><span class="mag-r">M9.5</span>
            </div>
            <div class="ev" data-s="1985-03-03T22:30:00" data-e="1985-03-04T02:30:00" data-mm="3.0" data-label="03 mar 1985 · algarrobo · M7.8">
              <span>03 mar 1985</span><span>algarrobo</span><span>M7.8</span>
            </div>
            <div class="ev" data-s="2010-02-27T06:00:00" data-e="2010-02-27T10:30:00" data-mm="3.0" data-label="27 feb 2010 · biobío · M8.8">
              <span>27 feb 2010</span><span>biobío</span><span class="mag-r">M8.8</span>
            </div>
            <div class="ev" data-s="2014-04-01T23:30:00" data-e="2014-04-02T03:30:00" data-mm="3.0" data-label="01 abr 2014 · iquique · M8.2">
              <span>01 abr 2014</span><span>iquique</span><span class="mag-r">M8.2</span>
            </div>
            <div class="ev" data-s="2015-09-16T22:30:00" data-e="2015-09-17T02:30:00" data-mm="3.0" data-label="16 sep 2015 · illapel · M8.3">
              <span>16 sep 2015</span><span>illapel</span><span class="mag-r">M8.3</span>

      </div>
      <div id="sismo-list"></div>
    </div>

    <!-- panel evento: aparece a la derecha sin mover nada -->
    <div id="event-panel">
      <div id="event-header"></div>
      <div id="event-list"></div>
    </div>

    <div id="scope-wrap"><canvas id="scope"></canvas></div>
  </div>
</div>

<div id="veil"><div id="veil-txt">chile</div></div>

<script>
// ── Reloj ─────────────────────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0');}
const MO=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function tick(){
  const s=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Santiago'}));
  document.getElementById('st-time').textContent=
    pad(s.getHours())+':'+pad(s.getMinutes())+':'+pad(s.getSeconds())+' · '+pad(s.getDate())+' '+MO[s.getMonth()];
}
tick(); setInterval(tick,1000);

// ── Estado ────────────────────────────────────────────────────────────────────
let quakes=[], evQuakes=[], audioReady=false, liveInt=null;
let actx, analyser, masterGain;

// ── USGS ──────────────────────────────────────────────────────────────────────
const BBOX='&minlatitude=-56&maxlatitude=-17&minlongitude=-76&maxlongitude=-66';
const BASE='https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&orderby=time'+BBOX;

function pq(eq){
  const p=eq.properties,c=eq.geometry.coordinates;
  let pl=(p.place||'').replace(/^\d+\s*km\s+[A-Z]+\s+of\s+/i,'').replace(/,?\s*chile$/i,'').trim().toUpperCase();
  if(pl.length>24)pl=pl.slice(0,24)+'…';
  return{id:eq.id,mag:parseFloat(p.mag)||0,lat:c[1],lon:c[0],dep:c[2],ms:p.time,pl};
}
async function doFetch(extra){
  try{const u=BASE+'&'+new URLSearchParams(extra).toString();const d=await(await fetch(u)).json();return(d.features||[]).map(pq);}catch(e){return[];}
}

// vivo = últimas 12 horas
async function fetchLive(){
  const start12=new Date(Date.now()-12*3600000).toISOString();
  const q=await doFetch({limit:50,minmagnitude:1.5,starttime:start12});
  if(!q.length)return;
  const prev=new Set(quakes.map(x=>x.id));
  const fresh=q.filter(x=>!prev.has(x.id));
  quakes=q; renderMainList(fresh);
  if(audioReady)fresh.forEach(x=>spawnOsc(x));
}

async function fetchEvent(s,e,mm){
  const q=await doFetch({limit:50,minmagnitude:mm,starttime:s,endtime:e});
  evQuakes=q; renderEventPanel();
  killPool();
  if(audioReady)evQuakes.slice(0,MAX).forEach(x=>spawnOsc(x));
  updateMapDots();
}

// ── Audio ─────────────────────────────────────────────────────────────────────
const MAX=12, pool=[];

function initAudio(){
  if(audioReady)return;
  const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
  actx=new AC(); analyser=actx.createAnalyser(); analyser.fftSize=512;
  masterGain=actx.createGain(); masterGain.gain.value=0.65;
  masterGain.connect(actx.destination); masterGain.connect(analyser);
  audioReady=true;
}
function mkRev(t,d){
  const l=Math.floor(actx.sampleRate*t),b=actx.createBuffer(2,l,actx.sampleRate);
  for(let c=0;c<2;c++){const a=b.getChannelData(c);for(let i=0;i<l;i++)a[i]=(Math.random()*2-1)*Math.pow(1-i/l,d);}
  const v=actx.createConvolver();v.buffer=b;return v;
}
function l2f(lat){const t=(lat-(-17))/((-56)-(-17));return 880*Math.pow(55/880,t);}
function l2p(lon){return((lon-(-76))/((-66)-(-76)))*2-1;}
function d2w(dep){if(dep<25)return'sine';if(dep<70)return'triangle';if(dep<150)return'sawtooth';return'square';}
function m2g(mag){return Math.min(0.28,0.022*Math.pow(2,mag-1.5));}
function ageM(ms){const h=(Date.now()-ms)/3600000;return Math.max(0.2,1-h/14);}

function spawnOsc(q){
  if(!audioReady||pool.length>=MAX)return;
  const freq=l2f(q.lat),wave=d2w(q.dep),pan=l2p(q.lon),rt=Math.max(2,6-q.dep/60);
  const gval=m2g(q.mag)*ageM(q.ms);
  const osc=actx.createOscillator(),filt=actx.createBiquadFilter(),gain=actx.createGain();
  const pn=actx.createStereoPanner?actx.createStereoPanner():null;
  const cv=mkRev(rt,2.2),dry=actx.createGain(),wet=actx.createGain();
  osc.type=wave;osc.frequency.value=freq;osc.detune.value=(q.dep%30)*1.2-18;
  filt.type='lowpass';filt.frequency.value=400+q.mag*180;filt.Q.value=1.2;
  gain.gain.value=0;dry.gain.value=0.4;wet.gain.value=0.6;
  osc.connect(filt);filt.connect(gain);
  const pre=pn?(()=>{gain.connect(pn);pn.pan.value=pan;return pn;})():gain;
  pre.connect(dry);pre.connect(cv);dry.connect(masterGain);cv.connect(wet);wet.connect(masterGain);
  osc.start();gain.gain.setTargetAtTime(gval,actx.currentTime,0.4);
  const fd=Math.max(30,300-q.dep);
  gain.gain.setTargetAtTime(0,actx.currentTime+fd,12);
  const node={osc,gain,filt,cv,dry,wet,pn,id:q.id};pool.push(node);
  updOsc();addRing(q);
  setTimeout(()=>{
    const i=pool.indexOf(node);if(i>-1)pool.splice(i,1);
    try{osc.stop();[osc,filt,gain,cv,dry,wet,pn].forEach(n=>n&&n.disconnect());}catch(e){}
    updOsc();
  },(fd+60)*1000);
}

function killPool(){
  pool.forEach(n=>{
    try{n.gain.gain.cancelScheduledValues(actx.currentTime);n.gain.gain.setTargetAtTime(0,actx.currentTime,0.08);
      setTimeout(()=>{try{n.osc.stop();[n.osc,n.filt,n.gain,n.cv,n.dry,n.wet,n.pn].forEach(x=>x&&x.disconnect());}catch(e){}},400);
    }catch(e){}
  });
  pool.length=0;updOsc();
}
function updOsc(){document.getElementById('st-osc').textContent=pool.length;updateMapDots();}

// ── Mapa ──────────────────────────────────────────────────────────────────────
function q2xy(lat,lon){
  const tx=(lat-(-17))/((-56)-(-17));
  const ty=(lon-(-76))/((-66)-(-76));
  return{x:5+tx*495, y:92-ty*68};
}
const NS='http://www.w3.org/2000/svg';
function mkEl(tag,attrs){const el=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;}

function updateMapDots(){
  const g=document.getElementById('quake-dots'); g.innerHTML='';
  const activeIds=new Set(pool.map(n=>n.id));
  // mostrar quakes vivos (siempre) + evQuakes (cuando hay evento)
  const allDots=[
    ...quakes.map(q=>({...q,_ev:false})),
    ...evQuakes.map(q=>({...q,_ev:true}))
  ];
  allDots.forEach(q=>{
    const{x,y}=q2xy(q.lat,q.lon);
    const big=q.mag>=6.0;
    const r=Math.max(1.5,q.mag*1.3);
    const active=activeIds.has(q.id)||q._ev;
    const col=big?'#c04030':(active?'#c8b89a':'#383836');
    if(active){
      const ringCls='qdot-ring'+(big?' red':'');
      const ringStroke=big?'rgba(192,64,48,0.5)':'rgba(200,184,154,0.45)';
      g.appendChild(mkEl('circle',{cx:x,cy:y,r:r*2,fill:'none',stroke:ringStroke,'stroke-width':'0.8',class:ringCls}));
      g.appendChild(mkEl('circle',{cx:x,cy:y,r:r+2,fill:big?'rgba(192,64,48,0.15)':'rgba(200,184,154,0.12)',filter:big?'url(#glow-red)':'url(#glow)'}));
    }
    g.appendChild(mkEl('circle',{cx:x,cy:y,r:r,fill:col,opacity:active?'1':'0.4'}));
  });
}

// ── Render listas ─────────────────────────────────────────────────────────────
function magClass(mag,i,isActive){
  if(mag>=6.0)return' huge';
  if(mag>=4.5)return' big';
  if(isActive)return' act';
  return'';
}
function fmtT(ms){
  const df=Date.now()-ms,m=Math.floor(df/60000),h=Math.floor(m/60);
  if(h>23)return Math.floor(h/24)+'d '+pad(h%24)+'h';
  if(h>0)return pad(h)+'h '+pad(m%60)+'m';
  return pad(m)+'m';
}
function fmtTutc(ms){
  const d=new Date(ms);return pad(d.getUTCDate())+' '+MO[d.getUTCMonth()]+' '+pad(d.getUTCHours())+':'+pad(d.getUTCMinutes())+'Z';
}

function renderMainList(fresh=[]){
  const fi=new Set((fresh||[]).map(x=>x.id));
  const list=document.getElementById('sismo-list');list.innerHTML='';
  quakes.slice(0,8).forEach((q,i)=>{
    const el=document.createElement('div');
    let c='sq'+(fi.has(q.id)?' new':magClass(q.mag,i,i<MAX));
    el.className=c;
    el.innerHTML='<span class="sq-mag">M'+q.mag.toFixed(1)+'</span><span class="sq-pl">'+q.pl+'</span><span class="sq-dep">'+Math.round(q.dep)+'km '+fmtT(q.ms)+'</span>';
    list.appendChild(el);
  });
  document.getElementById('st-n').textContent=quakes.length;
  if(quakes.length)document.getElementById('st-last').textContent='M'+quakes[0].mag.toFixed(1)+' '+fmtT(quakes[0].ms);
  updateMapDots();
}

function renderEventPanel(){
  const panel=document.getElementById('event-list');panel.innerHTML='';
  evQuakes.slice(0,10).forEach((q,i)=>{
    const el=document.createElement('div');
    el.className='sq'+magClass(q.mag,i,true);
    el.innerHTML='<span class="sq-mag">M'+q.mag.toFixed(1)+'</span><span class="sq-pl">'+q.pl+'</span><span class="sq-dep">'+Math.round(q.dep)+'km '+fmtTutc(q.ms)+'</span>';
    panel.appendChild(el);
  });
}

setInterval(()=>{if(quakes.length)renderMainList();},30000);

// ── Activación ────────────────────────────────────────────────────────────────
const veil=document.getElementById('veil');
function go(){
  initAudio();if(!audioReady)return;
  const p=actx.resume();
  const start=()=>{
    veil.classList.add('gone');
    if(quakes.length)quakes.slice(0,MAX).forEach(x=>spawnOsc(x));
    updOsc();
  };
  if(p&&typeof p.then==='function')p.then(start);else start();
}
veil.addEventListener('click',go);
veil.addEventListener('touchend',e=>{e.preventDefault();go();},{passive:false});

// ── Modos con fade ────────────────────────────────────────────────────────────
let currentMode='live';

function switchCtrl(to){
  const from=currentMode;
  if(from===to)return;
  const fromEl=document.getElementById('ctrl-'+from);
  const toEl=document.getElementById('ctrl-'+to);
  // fade out
  fromEl.classList.remove('on');
  // fade in después del transition
  setTimeout(()=>{
    toEl.style.opacity='0';
    toEl.classList.add('on');
    requestAnimationFrame(()=>requestAnimationFrame(()=>toEl.style.opacity=''));
  },280);
  currentMode=to;
}

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const m=b.dataset.m;
    switchCtrl(m);
    if(m==='live'){
      // volver a vivo: limpiar evento
      evQuakes=[];
      document.getElementById('event-panel').classList.remove('on');
      document.getElementById('event-header').textContent='';
      document.getElementById('hist-badge').className='';
      document.querySelectorAll('.ev').forEach(e=>e.classList.remove('on'));
      killPool();
      fetchLive();
      liveInt=setInterval(fetchLive,60000);
      updateMapDots();
    } else {
      clearInterval(liveInt);
    }
  });
});

// ── Eventos ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.ev').forEach(ev=>{
  ev.addEventListener('click',()=>{
    document.querySelectorAll('.ev').forEach(e=>e.classList.remove('on'));
    ev.classList.add('on');
    document.getElementById('hist-badge').className='on';
    document.getElementById('event-header').textContent=ev.dataset.label||'';
    document.getElementById('event-panel').classList.add('on');
    fetchEvent(ev.dataset.s,ev.dataset.e,parseFloat(ev.dataset.mm)||3.0);
  });
});

// ── Scope ─────────────────────────────────────────────────────────────────────
const sc=document.getElementById('scope'),sctx=sc.getContext('2d');
function rsz(){sc.width=sc.offsetWidth*devicePixelRatio;sc.height=sc.offsetHeight*devicePixelRatio;}
rsz();window.addEventListener('resize',rsz);
function drawSc(){
  requestAnimationFrame(drawSc);
  const W=sc.width,H=sc.height;sctx.clearRect(0,0,W,H);
  if(!analyser||pool.length===0){sctx.beginPath();sctx.strokeStyle='#1a1a18';sctx.lineWidth=1;sctx.moveTo(0,H/2);sctx.lineTo(W,H/2);sctx.stroke();return;}
  const data=new Float32Array(analyser.fftSize);analyser.getFloatTimeDomainData(data);
  sctx.beginPath();sctx.strokeStyle='#c8b89a';sctx.lineWidth=devicePixelRatio;sctx.lineJoin='round';
  const sw=W/data.length;
  data.forEach((v,i)=>{const x=i*sw,y=(0.5+v*0.44)*H;i===0?sctx.moveTo(x,y):sctx.lineTo(x,y);});
  sctx.stroke();
}
drawSc();

// ── Fondo ─────────────────────────────────────────────────────────────────────
const bg=document.getElementById('canvas-bg'),bctx=bg.getContext('2d');
let bW,bH;const rings=[];
function rbg(){bW=bg.width=window.innerWidth;bH=bg.height=window.innerHeight;}
rbg();window.addEventListener('resize',rbg);
function addRing(q){
  const rect=document.getElementById('map-center').getBoundingClientRect();
  const{x,y}=q2xy(q.lat,q.lon);
  rings.push({x:rect.left+x/510*rect.width,y:rect.top+y/110*rect.height,r:0,maxR:50+q.mag*25,t:0,big:q.mag>=6});
}
function drawBg(){
  requestAnimationFrame(drawBg);
  bctx.clearRect(0,0,bW,bH);bctx.fillStyle='#0a0a0a';bctx.fillRect(0,0,bW,bH);
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i];r.t+=0.005;r.r=r.maxR*Math.pow(r.t,0.6);
    const a=Math.max(0,0.12*(1-r.t));
    const col=r.big?`rgba(192,64,48,${a})`:`rgba(200,184,154,${a})`;
    bctx.beginPath();bctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    bctx.strokeStyle=col;bctx.lineWidth=Math.max(0.3,1*(1-r.t));bctx.stroke();
    if(r.t>=1)rings.splice(i,1);
  }
}
drawBg();

// ── Inicio ────────────────────────────────────────────────────────────────────
fetchLive();liveInt=setInterval(fetchLive,60000);
setInterval(()=>{if(quakes.length)quakes.slice(0,6).forEach(q=>addRing(q));},15000);
</script>
